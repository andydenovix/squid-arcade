<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Squid Pac-Man</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020810;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow-x:hidden;user-select:none;touch-action:none}
#wrap{position:relative;display:flex;flex-direction:column;align-items:center}
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;color:#3dd9a4;font-size:13px;letter-spacing:.08em;background:rgba(2,8,16,.9);width:100%}
canvas{display:block}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(2,8,16,.92);z-index:10}
#overlay h1{color:#3dd9a4;font-size:22px;letter-spacing:.12em;text-shadow:0 0 20px rgba(61,217,164,.5)}
#overlay p{color:rgba(255,255,255,.55);font-size:12px;text-align:center;line-height:2;max-width:280px}
#overlay button{background:transparent;border:1px solid #3dd9a4;color:#3dd9a4;font-family:monospace;font-size:14px;padding:9px 32px;cursor:pointer;letter-spacing:.1em;border-radius:2px}
#overlay button:hover:not(:disabled){background:rgba(61,217,164,.12)}
#overlay button:disabled{opacity:.35;cursor:default}
#dpad{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(2,54px);gap:6px;padding:10px 0;justify-content:center}
.dp{background:rgba(61,217,164,.08);border:1px solid rgba(61,217,164,.2);color:#3dd9a4;font-size:18px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dp:active{background:rgba(61,217,164,.28)}
#dpU{grid-column:2}
#dpL{grid-column:1;grid-row:2}
#dpD{grid-column:2;grid-row:2}
#dpR{grid-column:3;grid-row:2}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>SCORE <span id="scoreEl">0</span></span>
    <span style="color:rgba(61,217,164,.4);font-size:10px">SQUID PAC-MAN</span>
    <span>LIVES <span id="livesEl">&#128997;&#128997;&#128997;</span></span>
  </div>
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>SQUID PAC-MAN</h1>
    <p>Eat all the plankton to complete the reef!<br/>
    Power coral turns squids blue — eat them!<br/>
    Collect bonus fish for extra points.<br/><br/>
    Arrow keys or D-pad to swim</p>
    <button id="startBtn">START GAME</button>
  </div>
</div>
<div id="dpad">
  <div class="dp" id="dpU">&#9650;</div>
  <div class="dp" id="dpL">&#9664;</div>
  <div class="dp" id="dpD">&#9660;</div>
  <div class="dp" id="dpR">&#9654;</div>
</div>

// 0=open, 1=wall, 2=pellet, 3=power pellet, 4=ghost house
let maze,state,score,lives,level,totalPellets,pelletsLeft;
let player,ghosts,bonusFish,particles,wt;
let frightenTimer=0, scatterTimer=0, scatterMode=false;
let raf=null, keys={}, nextDir=null;
const GHOST_COLORS=['r','g','u','b','y'];
const GHOST_NAMES=['Red','Green','Purple','Blue','Grey'];
let levelMsg='', levelMsgTimer=0;

function deepCopy(m){ return m.map(r=>[...r]); }

function countPellets(m){
  let n=0;
  m.forEach(row=>row.forEach(c=>{ if(c===2||c===3) n++; }));
  return n;
}

function initGame(){
  score=0; lives=3; level=1; wt=0;
  upHUD();
  maze=deepCopy(MAZE_TEMPLATE);
  totalPellets=countPellets(maze);
  pelletsLeft=totalPellets;
  spawnPlayer();
  spawnGhosts();
  bonusFish=[]; particles=[];
  frightenTimer=0; scatterTimer=0; scatterMode=false;
  state='playing';
}

function spawnPlayer(){
  player={
    x:10*CELL+CELL/2, y:16*CELL+CELL/2,
    dx:0, dy:0,
    nextDx:0, nextDy:0,
    speed:2.2,
    mouthAngle:0.25,
    mouthDir:1,
    dead:false, deathTimer:0,
    // Clownfish body angle
    facing:0
  };
}

function spawnGhosts(){
  ghosts=[
    {x:centerX(10),y:centerY(9), col:10,row:9, dx:0, dy:-1,color:'r',mode:'house',houseTimer:40, frightened:false,eaten:false,name:'Red'},
    {x:centerX(9), y:centerY(10),col:9, row:10,dx:-1,dy:0, color:'g',mode:'house',houseTimer:90, frightened:false,eaten:false,name:'Green'},
    {x:centerX(10),y:centerY(10),col:10,row:10,dx:1, dy:0, color:'u',mode:'house',houseTimer:140,frightened:false,eaten:false,name:'Purple'},
    {x:centerX(11),y:centerY(10),col:11,row:10,dx:1, dy:0, color:'b',mode:'house',houseTimer:190,frightened:false,eaten:false,name:'Blue'},
    {x:centerX(10),y:centerY(11),col:10,row:11,dx:0, dy:1, color:'y',mode:'house',houseTimer:240,frightened:false,eaten:false,name:'Grey'},
  ];
}

function upHUD(){
  document.getElementById('scoreEl').textContent=score;
  const hearts=['&#128997;','&#128997;','&#128997;'];
  document.getElementById('livesEl').innerHTML=hearts.slice(0,lives).join('')||'';
}

function tileAt(x,y){ return maze[Math.floor(y/CELL)][Math.floor(x/CELL)]; }
function setTile(x,y,v){ maze[Math.floor(y/CELL)][Math.floor(x/CELL)]=v; }
function col(x){ return Math.floor(x/CELL); }
function row(y){ return Math.floor(y/CELL); }
function centerX(c){ return c*CELL+CELL/2; }
function centerY(r){ return r*CELL+CELL/2; }

function canMove(x,y,dx,dy,r){
  const nx=x+dx*r, ny=y+dy*r;
  const c1=col(nx-6), c2=col(nx+6);
  const r1=row(ny-6), r2=row(ny+6);
  for(let rr=r1;rr<=r2;rr++) for(let cc=c1;cc<=c2;cc++){
    if(rr<0||rr>=ROWS||cc<0||cc>=COLS) return false;
    if(maze[rr][cc]===1) return false;
  }
  return true;
}

function update(){
  if(state!=='playing') return;
  wt++;

  if(player.dead){ player.deathTimer++; if(player.deathTimer>80){ respawn(); } return; }

  // Frightened / scatter timers
  if(frightenTimer>0){ frightenTimer--; if(frightenTimer===0) ghosts.forEach(g=>{ g.frightened=false; }); }
  if(scatterTimer>0){ scatterTimer--; scatterMode=scatterTimer>0; }

  // Apply next direction if possible
  if((player.nextDx!==0||player.nextDy!==0)&&canMove(player.x,player.y,player.nextDx,player.nextDy,player.speed+1)){
    player.dx=player.nextDx; player.dy=player.nextDy;
  }

  // Move player
  if(canMove(player.x,player.y,player.dx,player.dy,player.speed)){
    player.x+=player.dx*player.speed;
    player.y+=player.dy*player.speed;
  } else {
    // Snap to grid
    player.x=centerX(Math.round((player.x-CELL/2)/CELL));
    player.y=centerY(Math.round((player.y-CELL/2)/CELL));
  }

  // Tunnel wrap
  if(player.x<0) player.x=CW; if(player.x>CW) player.x=0;

  // Mouth animation
  player.mouthAngle+=0.08*player.mouthDir;
  if(player.mouthAngle>0.28||player.mouthAngle<0.02) player.mouthDir*=-1;
  if(player.dx>0) player.facing=0;
  else if(player.dx<0) player.facing=Math.PI;
  else if(player.dy>0) player.facing=Math.PI/2;
  else if(player.dy<0) player.facing=-Math.PI/2;

  // Eat pellets
  const pc=col(player.x), pr=row(player.y);
  if(pr>=0&&pr<ROWS&&pc>=0&&pc<COLS){
    const t=maze[pr][pc];
    if(t===2){ maze[pr][pc]=0; score+=10; pelletsLeft--; upHUD(); burst(player.x,player.y,'#90e060',4); }
    if(t===3){
      maze[pr][pc]=0; score+=50; pelletsLeft--; upHUD();
      frightenTimer=420; // 7 seconds
      ghosts.forEach(g=>{ if(!g.eaten){ g.frightened=true; } });
      burst(player.x,player.y,'#facc15',8);
    }
  }

  // Bonus fish
  if(wt%600===0&&bonusFish.length<1){
    // Find a random open corridor
    bonusFish.push({x:centerX(10),y:centerY(13),life:300,pulse:0,type:Math.floor(Math.random()*3)});
  }
  bonusFish=bonusFish.filter(f=>{
    f.life--; f.pulse+=.1;
    if(Math.hypot(f.x-player.x,f.y-player.y)<14){
      const pts=[100,200,500][f.type];
      score+=pts; upHUD();
      burst(f.x,f.y,'#facc15',10);
      showMsg('+'+pts);
      return false;
    }
    return f.life>0;
  });

  // Move ghosts
  ghosts.forEach(g=>moveGhost(g));

  // Ghost-player collision
  if(!player.dead){
    ghosts.forEach(g=>{
      if(g.eaten) return;
      if(Math.hypot(g.x-player.x,g.y-player.y)<14){
        if(g.frightened){
          g.frightened=false; g.eaten=true;
          score+=200; upHUD();
          burst(g.x,g.y,'#3dd9a4',10);
          showMsg('200!');
          setTimeout(()=>{ g.eaten=false; g.x=centerX(10); g.y=centerY(10); g.col=10; g.row=10; g.dx=0; g.dy=-1; g.mode='house'; g.houseTimer=60; },3000);
        } else {
          player.dead=true; player.deathTimer=0;
          burst(player.x,player.y,'#f87171',14);
        }
      }
    });
  }

  // Level clear
  if(pelletsLeft<=0){
    state='levelclear';
    setTimeout(()=>{
      level++;
      maze=deepCopy(MAZE_TEMPLATE);
      pelletsLeft=totalPellets;
      spawnPlayer(); spawnGhosts();
      bonusFish=[]; frightenTimer=0;
      state='playing';
      showMsg('LEVEL '+level+'!');
    },2000);
  }

  // Particles
  particles=particles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.05; p.life-=3; return p.life>0; });

  if(levelMsgTimer>0) levelMsgTimer--;
}

function showMsg(t){ levelMsg=t; levelMsgTimer=90; }

function burst(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=.5+Math.random()*2.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-.5,life:40,col});
  }
}

function respawn(){
  lives--;upHUD();
  if(lives<=0){ state='over'; showOverlay('GAME OVER','The squids got you!<br/>Score: <span style="color:#3dd9a4;font-size:18px">'+score+'</span>','PLAY AGAIN'); return; }
  spawnPlayer();
  ghosts.forEach((g,i)=>{ g.frightened=false; g.eaten=false; g.mode='house'; g.houseTimer=60+i*60; g.x=centerX(10); g.y=centerY(10); g.col=10; g.row=10; g.dx=0; g.dy=-1; });
  frightenTimer=0;
}

function moveGhost(g){
  if(g.eaten) return;
  const spd=g.frightened?1.0:1.5+level*.1;

  if(g.mode==='house'){
    g.houseTimer--;
    if(g.houseTimer<=0){
      g.mode='chase';
      g.x=centerX(10); g.y=centerY(8);
      g.dx=0; g.dy=-1;
      // Snap to exact grid position
      g.col=10; g.row=8;
    }
    return;
  }

  // Grid-based movement: ghost always moves cell by cell
  // Track which grid cell the ghost is heading toward
  if(g.col===undefined){
    g.col=Math.round((g.x-CELL/2)/CELL);
    g.row=Math.round((g.y-CELL/2)/CELL);
    g.x=centerX(g.col); g.y=centerY(g.row);
  }

  const targetCX=g.col*CELL+CELL/2;
  const targetCY=g.row*CELL+CELL/2;
  const distToTarget=Math.hypot(g.x-targetCX, g.y-targetCY);

  if(distToTarget<=spd+0.5){
    // Arrived at cell centre — snap and choose next cell
    g.x=targetCX; g.y=targetCY;

    const tx=scatterMode||g.frightened ? CW-player.x : player.x;
    const ty=scatterMode||g.frightened ? CH-player.y : player.y;

    const dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
    let best=null, bestDist=Infinity;
    dirs.forEach(d=>{
      // No 180 reverse (unless only option)
      if(d.dx===-g.dx&&d.dy===-g.dy) return;
      const nc=g.col+d.dx, nr=g.row+d.dy;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
      const t=maze[nr][nc];
      if(t===1) return;
      if(t===4) return; // never re-enter ghost house
      const dist=Math.hypot(nc*CELL+CELL/2-tx, nr*CELL+CELL/2-ty);
      if(dist<bestDist){ bestDist=dist; best={...d,nc,nr}; }
    });

    // If no valid direction found (dead end), allow reverse
    if(!best){
      dirs.forEach(d=>{
        const nc=g.col+d.dx, nr=g.row+d.dy;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
        if(maze[nr][nc]===1||maze[nr][nc]===4) return;
        const dist=Math.hypot(nc*CELL+CELL/2-tx, nr*CELL+CELL/2-ty);
        if(dist<bestDist){ bestDist=dist; best={...d,nc,nr}; }
      });
    }

    if(best){
      g.dx=best.dx; g.dy=best.dy;
      g.col=best.nc; g.row=best.nr;
    }
  } else {
    // Move toward current target cell
    g.x+=g.dx*spd;
    g.y+=g.dy*spd;
  }

  // Tunnel wrap
  if(g.x<-CELL){ g.x=CW+CELL/2; g.col=COLS-1; }
  if(g.x>CW+CELL){ g.x=-CELL/2; g.col=0; }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(){
  // Ocean bg
  ctx.fillStyle='#020d18'; ctx.fillRect(0,0,CW,CH);

  // Draw maze
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const t=maze[r][c];
      const x=c*CELL, y=r*CELL;
      if(t===1){
        // Coral wall
        const grad=ctx.createLinearGradient(x,y,x+CELL,y+CELL);
        grad.addColorStop(0,'#0e3a5a');
        grad.addColorStop(1,'#0a2a44');
        ctx.fillStyle=grad;
        ctx.fillRect(x,y,CELL,CELL);
        // Coral texture highlights
        ctx.fillStyle='rgba(30,100,160,.25)';
        ctx.fillRect(x,y,CELL,2);
        ctx.fillRect(x,y,2,CELL);
        ctx.fillStyle='rgba(0,0,0,.3)';
        ctx.fillRect(x+CELL-2,y,2,CELL);
        ctx.fillRect(x,y+CELL-2,CELL,2);
        // Random coral bumps
        if((r*COLS+c)%5===0){
          ctx.fillStyle='rgba(60,160,200,.15)';
          ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,4,0,Math.PI*2); ctx.fill();
        }
      } else if(t===2){
        // Plankton pellet
        ctx.fillStyle='rgba(144,224,96,.8)';
        ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,2.5,0,Math.PI*2); ctx.fill();
      } else if(t===3){
        // Power coral - pulsing
        const p=.7+.3*Math.sin(wt*.1+c+r);
        ctx.fillStyle=`rgba(250,204,21,${p})`;
        ctx.shadowColor='#facc15'; ctx.shadowBlur=8*p;
        ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,5,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
      }
    }
  }

  // Ghost house door
  ctx.strokeStyle='rgba(200,100,200,.6)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(9*CELL,9*CELL+1); ctx.lineTo(12*CELL,9*CELL+1); ctx.stroke();

  // Bonus fish
  bonusFish.forEach(f=>{
    const p=.8+.2*Math.sin(f.pulse*3);
    ctx.save(); ctx.translate(f.x,f.y);
    // Fish body
    const cols=['#ff8c00','#ff4500','#ffd700'];
    ctx.fillStyle=cols[f.type];
    ctx.beginPath(); ctx.ellipse(0,0,10,7,0,0,Math.PI*2); ctx.fill();
    // Stripes (clownfish style)
    ctx.strokeStyle='white'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-2,-7); ctx.lineTo(-2,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,-6); ctx.lineTo(4,6); ctx.stroke();
    // Tail
    ctx.fillStyle=cols[f.type];
    ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-16,-7); ctx.lineTo(-16,7); ctx.fill();
    // Eye
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(7,-2,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='black'; ctx.beginPath(); ctx.arc(7.5,-2,1.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.restore();
    // Points label
    const pts=['100','200','500'][f.type];
    ctx.fillStyle='#facc15'; ctx.font='9px monospace';
    ctx.fillText(pts,f.x-6,f.y-14);
  });

  // Ghosts (squids)
  ghosts.forEach(g=>{
    if(g.eaten) return;
    ctx.save(); ctx.translate(g.x,g.y);
    const key=g.frightened?(frightenTimer<120&&Math.floor(wt/8)%2?'r':' f'):g.color;
    const im=imgs[key==' f'?'r':key]||imgs[g.color];
    if(im){
      ctx.globalAlpha=g.frightened?.85:1;
      if(g.frightened){ ctx.filter='hue-rotate(180deg) saturate(2)'; }
      ctx.drawImage(im,-14,-17,28,34);
      ctx.filter='none';
    }
    ctx.globalAlpha=1;
    // Eyes visible on frightened (scared white eyes)
    if(g.frightened){
      ctx.fillStyle='white';
      ctx.beginPath(); ctx.arc(-5,-4,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5,-4,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#1a1aff';
      ctx.beginPath(); ctx.arc(-4,-4,1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6,-4,1.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });

  // Player (clownfish)
  if(!player.dead){
    const alpha=player.dead?0:(player.deathTimer>0?Math.sin(wt*.5)*.5+.5:1);
    ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(player.facing);
    ctx.globalAlpha=alpha;
    // Body - orange ellipse
    ctx.fillStyle='#ff8c00';
    ctx.beginPath(); ctx.ellipse(0,0,11,8,0,0,Math.PI*2); ctx.fill();
    // White stripes
    ctx.strokeStyle='white'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(-2,-8); ctx.lineTo(-2,8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,-7); ctx.lineTo(4,7); ctx.stroke();
    // Tail
    ctx.fillStyle='#ff6600';
    ctx.beginPath(); ctx.moveTo(-11,0); ctx.lineTo(-18,-8); ctx.lineTo(-18,8); ctx.fill();
    // Mouth (pac-man style)
    ctx.fillStyle='#020810';
    ctx.beginPath();
    ctx.moveTo(11,0);
    ctx.arc(11,0,8,player.mouthAngle*Math.PI,-player.mouthAngle*Math.PI,true);
    ctx.fill();
    // Eye
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(4,-5,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='black'; ctx.beginPath(); ctx.arc(5,-5,2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // Particles
  particles.forEach(p=>{ ctx.globalAlpha=p.life/40; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;

  // Level message
  if(levelMsgTimer>0){
    ctx.globalAlpha=levelMsgTimer/90;
    ctx.fillStyle='#facc15'; ctx.font='bold 18px monospace';
    ctx.textAlign='center';
    ctx.fillText(levelMsg,CW/2,CH/2);
    ctx.textAlign='left';
    ctx.globalAlpha=1;
  }

  // Frightened timer bar
  if(frightenTimer>0){
    const pct=frightenTimer/420;
    ctx.fillStyle='rgba(61,100,220,.4)';
    ctx.fillRect(0,CH-4,CW*pct,4);
  }
}

function showOverlay(title,body,btn){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  const ov=document.getElementById('overlay');
  ov.querySelector('h1').textContent=title;
  ov.querySelector('p').innerHTML=body;
  ov.querySelector('button').textContent=btn;
  ov.style.display='flex';
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(){ update(); draw(); raf=requestAnimationFrame(loop); }

// ── Input ─────────────────────────────────────────────────────────────────────
function setDir(dx,dy){ player.nextDx=dx; player.nextDy=dy; }

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){e.preventDefault();setDir(-1,0);}
  if(e.key==='ArrowRight'){e.preventDefault();setDir(1,0);}
  if(e.key==='ArrowUp'){e.preventDefault();setDir(0,-1);}
  if(e.key==='ArrowDown'){e.preventDefault();setDir(0,1);}
});

document.getElementById('dpU').addEventListener('pointerdown',e=>{e.preventDefault();setDir(0,-1);});
document.getElementById('dpD').addEventListener('pointerdown',e=>{e.preventDefault();setDir(0,1);});
document.getElementById('dpL').addEventListener('pointerdown',e=>{e.preventDefault();setDir(-1,0);});
document.getElementById('dpR').addEventListener('pointerdown',e=>{e.preventDefault();setDir(1,0);});

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  if(raf){cancelAnimationFrame(raf);raf=null;}
  initGame(); loop();
});
</script>

<style>
/* ── Mobile viewport fit ── */
@media (max-height: 700px), (max-width: 480px) {
  body { justify-content: flex-start !important; overflow-y: auto !important; }
  #wrap { transform-origin: top center; }
}
</style>
<script>
(function(){
  function fitGame(){
    const wrap = document.getElementById('wrap');
    if(!wrap) return;
    const btns = document.getElementById('controls') ||
                 document.getElementById('ctrlBar') ||
                 document.getElementById('dpad') ||
                 document.getElementById('btns') ||
                 document.getElementById('squidBar');
    const hud  = document.getElementById('hud');

    // Total natural height of all elements
    const wrapH   = wrap.scrollHeight || wrap.offsetHeight;
    const btnsH   = btns  ? btns.offsetHeight  : 0;
    const hudH    = hud   ? hud.offsetHeight   : 0;
    const padding = 16;
    const totalH  = wrapH + btnsH + hudH + padding;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Scale down wrap+canvas to fit height, never scale up
    const scaleH = Math.min(1, (vh - btnsH - padding) / (wrapH + hudH || 1));
    const scaleW = Math.min(1, vw / (wrap.offsetWidth || 480));
    const scale  = Math.min(scaleH, scaleW);

    if(scale < 1){
      wrap.style.transform = 'scale(' + scale + ')';
      wrap.style.transformOrigin = 'top center';
      wrap.style.marginBottom = (wrapH * (scale - 1)) + 'px';
    } else {
      wrap.style.transform = '';
      wrap.style.marginBottom = '';
    }
  }
  window.addEventListener('load', fitGame);
  window.addEventListener('resize', fitGame);
  setTimeout(fitGame, 300);
})();
</script>
