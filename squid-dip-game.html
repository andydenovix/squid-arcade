<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Squid Dip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:linear-gradient(180deg,#062030 0%,#0d3d52 40%,#1a6b8a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
#game{width:100%;max-width:420px;padding:24px 16px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;position:relative}
.bubble-wrap{position:fixed;inset:0;pointer-events:none;z-index:0}
.bub{position:absolute;border-radius:50%;bottom:-60px;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.4),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.18);animation:bubRise linear infinite}
@keyframes bubRise{0%{transform:translateY(0);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-110vh);opacity:0}}
.z1{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%}
.title{color:white;font-size:24px;font-weight:700;letter-spacing:.04em}
.subtitle{color:rgba(255,255,255,.5);font-size:13px}
.score-row{display:flex;gap:16px}
.score-card{background:rgba(255,255,255,.1);border:0.5px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 20px;text-align:center}
.score-label{color:rgba(255,255,255,.5);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.score-val{color:white;font-size:22px;font-weight:700}
.hint-box{background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 16px;color:rgba(255,255,255,.7);font-size:13px;text-align:center;max-width:340px;line-height:1.4}
.phrase-area{display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;max-width:380px;min-height:40px}
.word-group{display:flex;gap:3px}
.letter-box{width:22px;height:28px;border-bottom:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;color:white;font-size:15px;font-weight:700;transition:all .25s}
.letter-box.revealed{border-bottom-color:#3dd9a4;color:#3dd9a4}
.misses-row{display:flex;gap:6px}
.miss-dot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s}
.miss-dot.used{background:#f87171}
.keyboard{display:flex;flex-direction:column;gap:5px;align-items:center}
.kb-row{display:flex;gap:4px}
.kb-btn{width:31px;height:34px;border-radius:6px;border:0.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:white;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.kb-btn:hover:not(:disabled){background:rgba(255,255,255,.28)}
.kb-btn:disabled{cursor:default}
.kb-btn.hit{background:rgba(61,217,164,.25);border-color:#3dd9a4;color:#3dd9a4}
.kb-btn.miss{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.2)}
.action-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn-solve{background:linear-gradient(135deg,#3dd9a4,#2bb88a);border:none;border-radius:20px;color:#062030;font-size:13px;font-weight:700;padding:9px 22px;cursor:pointer;transition:transform .15s}
.btn-solve:hover{transform:scale(1.05)}
.btn-next{background:rgba(255,255,255,.15);border:0.5px solid rgba(255,255,255,.3);border-radius:20px;color:white;font-size:13px;font-weight:600;padding:9px 22px;cursor:pointer;display:none}
.btn-giveup{background:rgba(248,113,113,.15);border:0.5px solid rgba(248,113,113,.4);border-radius:20px;color:#f87171;font-size:13px;font-weight:600;padding:9px 22px;cursor:pointer}
.btn-giveup:hover{background:rgba(248,113,113,.25)}
.btn-hint{background:rgba(250,204,21,.15);border:0.5px solid rgba(250,204,21,.4);border-radius:20px;color:#facc15;font-size:13px;font-weight:600;padding:9px 22px;cursor:pointer}
.btn-hint:hover{background:rgba(250,204,21,.25)}
.btn-hint:disabled{opacity:.35;cursor:default}
.hint-reveal{background:rgba(250,204,21,.1);border:0.5px solid rgba(250,204,21,.25);border-radius:8px;padding:8px 14px;color:#facc15;font-size:12px;text-align:center;max-width:340px;display:none}
.btn-next:hover{background:rgba(255,255,255,.22)}
.solve-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);border-radius:20px;color:white;font-size:13px;padding:8px 16px;width:240px;display:none}
.solve-input::placeholder{color:rgba(255,255,255,.35)}
.solve-input:focus{outline:none;border-color:#3dd9a4}
.msg{font-size:14px;font-weight:600;text-align:center;min-height:20px}
.msg.win{color:#3dd9a4}
.msg.lose{color:#f87171}
.msg.info{color:rgba(255,255,255,.6)}
.squid-wrap{position:relative;width:120px;height:147px;cursor:default}
.squid-outer{animation:driftY 6s ease-in-out infinite}
.squid-middle{animation:driftX 9s ease-in-out infinite;animation-delay:-2s}
.squid-wrap{animation:breathe 4s ease-in-out infinite,shadowD 6s ease-in-out infinite;animation-delay:-1s,0s}
.squid-wrap.popping{animation:squidPop .6s cubic-bezier(.36,.07,.19,.97) forwards}
@keyframes driftY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes driftX{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
@keyframes breathe{0%,100%{transform:scale(1)}40%{transform:scale(1.03)}70%{transform:scale(.988)}}
@keyframes shadowD{0%,100%{filter:drop-shadow(0 12px 16px rgba(0,0,0,.5))}30%{filter:drop-shadow(-3px 6px 12px rgba(0,0,0,.35))}65%{filter:drop-shadow(2px 10px 14px rgba(0,0,0,.42))}}
@keyframes shimF{0%,100%{opacity:0}45%{opacity:.35}55%{opacity:.35}}
@keyframes eyeBlink{0%,85%,100%{transform:scaleY(1)}90%{transform:scaleY(.06)}}
@keyframes squidPop{0%{transform:scale(1,1)}20%{transform:scale(1.1,.88)}45%{transform:scale(.92,1.12)}65%{transform:scale(1.05,.95)}82%{transform:scale(.98,1.02)}100%{transform:scale(1,1)}}
.sq-layer{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:block}
.sq-shimmer{animation:shimF 8s ease-in-out infinite;animation-delay:2s;z-index:3}
.squid-eye{transform-origin:center;animation:eyeBlink 5s ease-in-out infinite}
.eyes-overlay{position:absolute;top:0;left:0;width:120px;height:147px;pointer-events:none;z-index:4}
</style>
</head>

      <g class="squid-eye" style="transform-origin:53px 93px">
        <circle cx="53" cy="93" r="3" fill="white"/>
        <circle cx="54" cy="94" r="1" fill="#0f2a38"/>
        <circle cx="54" cy="92" r="1" fill="white"/>
      </g>
      <g class="squid-eye" style="transform-origin:65px 93px;animation-delay:.15s">
        <circle cx="65" cy="93" r="3" fill="white"/>
        <circle cx="66" cy="94" r="1" fill="#0f2a38"/>
        <circle cx="66" cy="92" r="1" fill="white"/>

  </div></div></div>
  <div class="hint-box" id="hintBox"></div>
  <div class="misses-row" id="missesRow"></div>
  <div class="phrase-area" id="phraseArea"></div>
  <div class="msg info" id="msgEl">&nbsp;</div>
  <div class="keyboard" id="keyboard"></div>
  <div class="action-row">
    <button class="btn-hint" id="btnHint">Hint</button>
    <button class="btn-solve" id="btnSolve">Solve it</button>
    <button class="btn-giveup" id="btnGiveup">I give up</button>
    <button class="btn-next" id="btnNext">Next phrase</button>
  </div>
  <div class="hint-reveal" id="hintReveal"></div>
<input class="solve-input" id="solveInput" placeholder="Type your answer and press Enter" autocomplete="off"/>
</div>
</div>

<script>
const PHRASES=[
  ["DS ELEVEN SERIES","DeNovix multi-award winning spectrophotometer and fluorometer"],
  ["CELLDROP","DeNovix automated cell counter that counts without slides"],
  ["SPECTROPHOTOMETER","Instrument measuring light absorption at specific wavelengths"],
  ["FLUOROMETER","Instrument detecting and quantifying fluorescent molecules"],
  ["MICROVOLUME MEASUREMENT","Quantifying samples as small as one microlitre"],
  ["SMARTPATH TECHNOLOGY","DeNovix patented system for accurate sample measurement"],
  ["UV VIS SPECTROSCOPY","Using ultraviolet and visible light to analyse samples"],
  ["CELL VIABILITY","Measuring the proportion of living cells in a sample"],
  ["TRYPAN BLUE EXCLUSION","Dye based method for distinguishing live from dead cells"],
  ["NUCLEIC ACID QUANTIFICATION","Measuring the concentration of DNA or RNA in a sample"],
  ["ABSORBANCE","Measure of how much light a sample absorbs at a given wavelength"],
  ["QFX FLUOROMETER","DeNovix benchtop instrument for sensitive fluorescence detection"],
  ["DSDNA QUANTIFICATION","Measuring double stranded DNA using fluorescent dyes"],
  ["PROTEIN CONCENTRATION","Determining the amount of protein present in a sample"],
  ["CUVETTE","Transparent vessel used to hold samples for optical measurement"],
  ["FLUORESCENCE QUANTIFICATION","Using light emission to measure sample concentration"],
  ["DS EIGHT X","DeNovix eight channel spectrophotometer for high throughput use"],
  ["CELL COUNTING","Determining the number of cells present in a sample volume"],
  ["NANODROP ALTERNATIVE","Compact microvolume instrument replacing traditional systems"],
  ["OPTICAL DENSITY","Measure of light attenuation used to estimate cell concentration"],
  ["BLANK CORRECTION","Subtracting background absorbance to improve measurement accuracy"],
  ["PATHLENGTH CORRECTION","Adjusting readings to account for variable sample depth"],
  ["DENOVIX EZDROP","Software application for simplified spectrophotometer operation"],
  ["RNA INTEGRITY","Assessment of RNA quality prior to downstream analysis"],
  ["ACRIDINE ORANGE","Fluorescent dye used to distinguish live and dead cells"],
];
const MAX_MISSES=7;
let phrase,hint,guessed,misses,solved,score,streak,solving,usedIdx;

function init(){score=0;streak=0;usedIdx=[];$('scoreVal').textContent='0';$('streakVal').textContent='0';newRound();}
function $(id){return document.getElementById(id);}

function newRound(){
  if(usedIdx.length>=PHRASES.length)usedIdx=[];
  let idx;do{idx=Math.floor(Math.random()*PHRASES.length);}while(usedIdx.includes(idx));
  usedIdx.push(idx);
  [phrase,hint]=PHRASES[idx];
  guessed=new Set();misses=0;solved=false;solving=false;
  $('hintBox').textContent=hint;
  $('msgEl').textContent=' ';
  $('msgEl').className='msg info';
  $('btnNext').style.display='none';
  $('btnSolve').style.display='inline-block';
  $('solveInput').style.display='none';
  $('solveInput').value='';
  $('btnGiveup').style.display='inline-block';
  $('btnHint').style.display='inline-block';
  $('btnHint').disabled=false;
  $('hintReveal').style.display='none';
  $('hintReveal').textContent='';
  renderAll();
}

function renderAll(){renderMisses();renderPhrase();renderKeyboard();}

function renderMisses(){
  const row=$('missesRow');row.innerHTML='';
  for(let i=0;i<MAX_MISSES;i++){const d=document.createElement('div');d.className='miss-dot'+(i<misses?' used':'');row.appendChild(d);}
}

function renderPhrase(){
  const area=$('phraseArea');area.innerHTML='';
  phrase.split(' ').forEach(word=>{
    const wg=document.createElement('div');wg.className='word-group';
    word.split('').forEach(ch=>{
      const lb=document.createElement('div');
      lb.className='letter-box'+((guessed.has(ch)||solved)?' revealed':'');
      lb.textContent=(guessed.has(ch)||solved)?ch:' ';
      wg.appendChild(lb);
    });
    area.appendChild(wg);
  });
}

function renderKeyboard(){
  const kb=$('keyboard');kb.innerHTML='';
  ['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'].forEach(row=>{
    const r=document.createElement('div');r.className='kb-row';
    row.split('').forEach(ch=>{
      const btn=document.createElement('button');btn.className='kb-btn';btn.textContent=ch;
      if(guessed.has(ch)){btn.disabled=true;btn.classList.add(phrase.includes(ch)?'hit':'miss');}
      if(solved||solving)btn.disabled=true;
      btn.addEventListener('click',()=>guess(ch));
      r.appendChild(btn);
    });
    kb.appendChild(r);
  });
}

function guess(ch){
  if(guessed.has(ch)||solved)return;
  guessed.add(ch);
  if(!phrase.includes(ch)){misses++;if(misses>=MAX_MISSES){renderAll();endRound(false);return;}}
  renderAll();
  const allRevealed=phrase.replace(/ /g,'').split('').every(c=>guessed.has(c));
  if(allRevealed)endRound(true,false);
}

function calcPoints(fromSolve){
  const unique=new Set(phrase.replace(/ /g,'')).size;
  const pts=Math.max(10,(unique-misses)*15+Math.max(0,(unique-guessed.size)*5));
  return fromSolve?pts*2:pts;
}

function endRound(win,fromSolve){
  solved=true;popSquid();
  if(win){
    const pts=calcPoints(fromSolve);score+=pts;streak++;
    $('scoreVal').textContent=score;$('streakVal').textContent=streak;
    $('msgEl').textContent='+'+pts+' points!'+(streak>1?' Streak ×'+streak:'');
    $('msgEl').className='msg win';
  } else {
    streak=0;$('streakVal').textContent='0';
    $('msgEl').textContent='The phrase was: '+phrase;
    $('msgEl').className='msg lose';
  }
  renderPhrase();renderKeyboard();
  $('btnSolve').style.display='none';
  $('solveInput').style.display='none';
  $('btnGiveup').style.display='none';
  $('btnHint').style.display='none';
  $('btnNext').style.display='inline-block';
}

function popSquid(){
  const sq=$('squidEl');sq.classList.remove('popping');void sq.offsetWidth;sq.classList.add('popping');
  setTimeout(()=>sq.classList.remove('popping'),650);
}

$('btnSolve').addEventListener('click',()=>{
  if(solving)return;solving=true;
  const inp=$('solveInput');inp.style.display='block';inp.focus();
  $('btnSolve').style.display='none';
  $('msgEl').textContent='Type the phrase and press Enter (double points!)';
  $('msgEl').className='msg info';
  renderKeyboard();
});

$('solveInput').addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const attempt=e.target.value.trim().toUpperCase();
  if(attempt===phrase){endRound(true,true);}
  else{
    misses++;renderMisses();e.target.value='';
    if(misses>=MAX_MISSES){endRound(false);}
    else{
      solving=false;
      $('msgEl').textContent='Not quite — keep guessing letters';
      $('msgEl').className='msg lose';
      $('solveInput').style.display='none';
      $('btnSolve').style.display='inline-block';
      renderKeyboard();
    }
  }
});

$('btnNext').addEventListener('click',newRound);

(function bubbles(){
  const b=$('bwrap');
  for(let i=0;i<20;i++){
    const el=document.createElement('div');el.className='bub';
    const sz=6+Math.random()*30;
    el.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${13+Math.random()*18}s;animation-delay:${Math.random()*16}s`;
    b.appendChild(el);
  }
})();

$('btnHint').addEventListener('click',()=>{
  const letters=[...new Set(phrase.replace(/ /g,'').split(''))].filter(c=>!guessed.has(c));
  if(!letters.length) return;
  const pick=letters[Math.floor(Math.random()*letters.length)];
  guessed.add(pick);
  misses++;
  renderAll();
  $('hintReveal').textContent='The letter “'+pick+'” has been revealed (-1 miss)';
  $('hintReveal').style.display='block';
  $('btnHint').disabled=true;
  setTimeout(()=>{ $('hintReveal').style.display='none'; }, 3000);
  const allRevealed=phrase.replace(/ /g,'').split('').every(c=>guessed.has(c));
  if(allRevealed) endRound(true,false);
  else if(misses>=MAX_MISSES) endRound(false);
});

$('btnGiveup').addEventListener('click',()=>{
  solved=true;
  streak=0;$('streakVal').textContent='0';
  $('msgEl').textContent='The phrase was: '+phrase;
  $('msgEl').className='msg lose';
  renderPhrase();renderKeyboard();
  $('btnSolve').style.display='none';
  $('solveInput').style.display='none';
  $('btnGiveup').style.display='none';
  $('btnHint').style.display='none';
  $('btnNext').style.display='inline-block';
});

init();
</script>
