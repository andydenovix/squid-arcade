<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Squid Asteroids</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020810;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow-x:hidden;user-select:none;touch-action:none}
#wrap{position:relative}
#hud{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;color:#3dd9a4;font-size:13px;letter-spacing:.08em;background:rgba(2,8,16,.9)}
canvas{display:block}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(2,8,16,.92);z-index:10}
#overlay h1{color:#3dd9a4;font-size:24px;letter-spacing:.12em;text-shadow:0 0 20px rgba(61,217,164,.5)}
#overlay h2{color:#f87171;font-size:20px;letter-spacing:.1em}
#overlay p{color:rgba(255,255,255,.55);font-size:12px;text-align:center;line-height:2;max-width:300px}
#overlay button{background:transparent;border:1px solid #3dd9a4;color:#3dd9a4;font-family:monospace;font-size:14px;padding:10px 36px;cursor:pointer;letter-spacing:.1em;border-radius:2px}
#overlay button:hover:not(:disabled){background:rgba(61,217,164,.15)}
#overlay button:disabled{opacity:.35;cursor:default}
#controls{display:flex;gap:8px;padding:10px 0;width:480px;justify-content:center}
.cb{height:52px;background:rgba(61,217,164,.08);border:1px solid rgba(61,217,164,.2);color:#3dd9a4;cursor:pointer;border-radius:6px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;align-items:center;justify-content:center;font-size:16px}
.cb:active{background:rgba(61,217,164,.28)}
#cL,#cR{width:70px}
#cT{width:70px;font-size:12px;letter-spacing:.06em}
#cF{width:110px;font-size:12px;letter-spacing:.06em}
#cS{width:70px;font-size:11px;letter-spacing:.04em}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>SCORE <span id="scoreEl">0</span></span>
    <span style="color:rgba(61,217,164,.4);font-size:11px">SQUID ASTEROIDS</span>
    <span>WAVE <span id="waveEl">1</span>/5 &nbsp; &#127994;<span id="livesEl">3</span></span>
  </div>
  <canvas id="c" width="480" height="540"></canvas>
  <div id="overlay">
    <h1>SQUID ASTEROIDS</h1>
    <p>Survive 5 waves of sharks and hammerheads!<br/>Dodge bull shark hunters and their missiles.<br/>Defeat the Great White boss to win!<br/><br/>
    Rotate &bull; Thrust &bull; Fire ink &bull; Shield<br/>
    Arrow keys + Space + S, or buttons below</p>
    <button id="startBtn" disabled>LOADING...</button>
  </div>
</div>
<div id="controls">
  <div class="cb" id="cL">&#8634;</div>
  <div class="cb" id="cT">THRUST</div>
  <div class="cb" id="cF">&#9632; FIRE</div>
  <div class="cb" id="cS">SHIELD</div>
  <div class="cb" id="cR">&#8635;</div>
</div>

  i.src=src;
}

const TOTAL_WAVES=5;
let state,score,lives,wave,raf=null;
let player,bullets,asteroids,sharks,debris,particles,powerups;
let bossObj=null,bossPhase=0;
let wt=0; // wave timer
const keys={};

// ── Stars ─────────────────────────────────────────────────────────────────────
const STARS=Array.from({length:80},(_,i)=>({
  x:(i*137+83)%CW, y:(i*97+41)%CH,
  o:.1+((i%5)/5)*.7, r:(i%6===0)?1.5:0.7
}));

// ── Init ──────────────────────────────────────────────────────────────────────
function initGame(){
  score=0;lives=3;wave=1;state='playing';
  upHUD();
  player={
    x:CW/2,y:CH/2,
    vx:0,vy:0,
    angle:-Math.PI/2, // points up
    r:16,
    shieldTime:0,
    shieldCooldown:0,
    invincible:0,
    rapidFire:0,
    dead:false
  };
  bullets=[];particles=[];powerups=[];
  spawnWave(1);
}

function spawnWave(w){
  asteroids=[];sharks=[];debris=[];bossObj=null;
  wt=0;

  if(w===TOTAL_WAVES){
    // Boss wave
    bossObj={
      x:CW/2,y:80,
      vx:0.8,vy:0.4,
      angle:0,
      hp:20,maxHp:20,
      r:44,
      shootTimer:0,
      phase:0
    };
    document.getElementById('waveEl').textContent='BOSS';
    return;
  }

  const n=2+w;
  for(let i=0;i<n;i++) spawnAsteroid('large');

  // Sharks appear from wave 3, one at a time
  if(w>=3){
    spawnShark();
  }
  // Whale debris from wave 4
  if(w>=4){
    for(let i=0;i<w;i++) spawnDebris();
  }
  // Ink cloud power-up
  spawnPowerup();
  document.getElementById('waveEl').textContent=w+'/'+TOTAL_WAVES;
}

function randEdge(){
  const side=Math.floor(Math.random()*4);
  if(side===0) return {x:Math.random()*CW,y:-30};
  if(side===1) return {x:CW+30,y:Math.random()*CH};
  if(side===2) return {x:Math.random()*CW,y:CH+30};
  return {x:-30,y:Math.random()*CH};
}

function spawnAsteroid(size){
  const pos=randEdge();
  const speed=(size==='large'?0.6:size==='medium'?1.0:1.5)+(Math.random()*.5);
  const angle=Math.random()*Math.PI*2;
  const r={large:26,medium:16,small:9}[size];
  asteroids.push({
    x:pos.x,y:pos.y,
    vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
    rot:Math.random()*Math.PI*2,
    rotSpeed:(Math.random()-.5)*.04,
    r,size,
    hp:{large:3,medium:2,small:1}[size]
  });
}

function spawnShark(){
  const pos=randEdge();
  sharks.push({x:pos.x,y:pos.y,vx:0,vy:0,angle:0,r:14,hp:2,shootTimer:60+Math.random()*120});
}

function spawnDebris(){
  const pos=randEdge();
  const angle=Math.random()*Math.PI*2;
  const speed=0.4+Math.random()*.6;
  debris.push({
    x:pos.x,y:pos.y,
    vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
    rot:Math.random()*Math.PI*2,
    rotSpeed:(Math.random()-.5)*.02,
    r:20+Math.random()*14,
    hp:4
  });
}

function spawnPowerup(){
  // Alternate types each spawn
  const types=['shield','rapid'];
  const type=types[Math.floor(Math.random()*types.length)];
  powerups.push({
    x:80+Math.random()*(CW-160),
    y:80+Math.random()*(CH-160),
    type,
    life:600,
    pulse:0
  });
}

function upHUD(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('livesEl').textContent=lives;
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(){
  if(state!=='playing') return;
  wt++;

  // Player
  if(!player.dead){
    if(keys.left||keys.ArrowLeft)  player.angle-=0.065;
    if(keys.right||keys.ArrowRight) player.angle+=0.065;
    if(keys.thrust||keys.ArrowUp){
      player.vx+=Math.cos(player.angle)*.18;
      player.vy+=Math.sin(player.angle)*.18;
    }
    // Drag
    player.vx*=.97; player.vy*=.97;
    // Speed cap
    const spd=Math.hypot(player.vx,player.vy);
    if(spd>5){ player.vx=player.vx/spd*5; player.vy=player.vy/spd*5; }
    player.x=(player.x+player.vx+CW)%CW;
    player.y=(player.y+player.vy+CH)%CH;
    if(player.shieldTime>0) player.shieldTime--;
    if(player.shieldCooldown>0) player.shieldCooldown--;
    if(player.invincible>0) player.invincible--;
    if(player.rapidFire>0) player.rapidFire--;
  }

  // Bullets
  bullets=bullets.filter(b=>{
    b.x+=b.vx; b.y+=b.vy; b.life--;
    b.x=(b.x+CW)%CW; b.y=(b.y+CH)%CH;
    return b.life>0;
  });

  // Asteroids
  asteroids.forEach(a=>{
    a.x=(a.x+a.vx+CW)%CW; a.y=(a.y+a.vy+CH)%CH;
    a.rot+=a.rotSpeed;
  });

  // Sharks chase player
  sharks.forEach(s=>{
    const dx=player.x-s.x, dy=player.y-s.y;
    const d=Math.hypot(dx,dy)||1;
    s.angle=Math.atan2(dy,dx);
    const spd=1.2;
    s.vx+=dx/d*.06; s.vy+=dy/d*.06;
    s.vx*=.94; s.vy*=.94;
    const sp=Math.hypot(s.vx,s.vy);
    if(sp>spd){s.vx=s.vx/sp*spd;s.vy=s.vy/sp*spd;}
    s.x=(s.x+s.vx+CW)%CW; s.y=(s.y+s.vy+CH)%CH;
    // Shark fires at player only from wave 4
    s.shootTimer--;
    if(s.shootTimer<=0){
      s.shootTimer=90+Math.random()*90;
      const sd=Math.hypot(dx,dy);
      if(sd<350&&wave>=4){
        bullets.push({x:s.x,y:s.y,vx:dx/sd*5,vy:dy/sd*5,life:60,enemy:true,r:4});
      }
    }
  });

  // Debris drifts
  debris.forEach(d=>{
    d.x=(d.x+d.vx+CW)%CW; d.y=(d.y+d.vy+CH)%CH;
    d.rot+=d.rotSpeed;
  });

  // Boss
  if(bossObj){
    bossObj.x+=bossObj.vx; bossObj.y+=bossObj.vy;
    if(bossObj.x<60||bossObj.x>CW-60) bossObj.vx*=-1;
    if(bossObj.y<60||bossObj.y>CH/2)  bossObj.vy*=-1;
    bossObj.angle+=.008;
    bossObj.shootTimer--;
    if(bossObj.shootTimer<=0){
      bossObj.shootTimer=40-Math.floor(bossObj.phase*10);
      // Fire 3 bullets spread
      for(let i=-1;i<=1;i++){
        const a=Math.atan2(player.y-bossObj.y,player.x-bossObj.x)+i*.3;
        bullets.push({x:bossObj.x,y:bossObj.y,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,life:90,enemy:true,r:5});
      }
    }
    // Phase change
    bossObj.phase=1-(bossObj.hp/bossObj.maxHp);
  }

  // Powerups
  powerups=powerups.filter(p=>{ p.life--; p.pulse+=.1; return p.life>0; });

  // ── Collisions ───────────────────────────────────────────────────────────────
  // Player bullets vs asteroids
  for(let bi=bullets.length-1;bi>=0;bi--){
    if(bullets[bi].enemy) continue;
    const bl=bullets[bi];
    let hit=false;
    for(let ai=asteroids.length-1;ai>=0;ai--){
      const as=asteroids[ai];
      if(Math.hypot(bl.x-as.x,bl.y-as.y)<as.r+4){
        as.hp--; hit=true;
        burst(as.x,as.y,'#4a7888',6);
        if(as.hp<=0){
          asteroids.splice(ai,1);
          score+=as.size==='large'?20:as.size==='medium'?10:5;
          // Split
          if(as.size==='large'){spawnAsteroid('medium');spawnAsteroid('medium');}
          else if(as.size==='medium'){spawnAsteroid('small');spawnAsteroid('small');}
        }
        break;
      }
    }
    // vs debris
    for(let di=debris.length-1;di>=0;di--){
      const d=debris[di];
      if(Math.hypot(bl.x-d.x,bl.y-d.y)<d.r+4){
        d.hp--; hit=true;
        burst(d.x,d.y,'#607080',4);
        if(d.hp<=0){ debris.splice(di,1); score+=30; }
        break;
      }
    }
    // vs sharks
    for(let si=sharks.length-1;si>=0;si--){
      const s=sharks[si];
      if(Math.hypot(bl.x-s.x,bl.y-s.y)<s.r+4){
        s.hp--; hit=true;
        burst(s.x,s.y,'#506070',6);
        if(s.hp<=0){ sharks.splice(si,1); score+=50; if(wave>=4) spawnShark(); }
        break;
      }
    }
    // vs boss
    if(bossObj&&Math.hypot(bl.x-bossObj.x,bl.y-bossObj.y)<bossObj.r+4){
      bossObj.hp--; hit=true;
      burst(bossObj.x+(Math.random()-0.5)*40,bossObj.y+(Math.random()-0.5)*40,'#f87171',8);
      score+=10;
      if(bossObj.hp<=0){ winGame(); return; }
    }
    if(hit) bullets.splice(bi,1);
  }

  // Enemy bullets vs player
  if(!player.dead&&player.invincible<=0){
    for(let bi=bullets.length-1;bi>=0;bi--){
      if(!bullets[bi].enemy) continue;
      const bl=bullets[bi];
      if(Math.hypot(bl.x-player.x,bl.y-player.y)<player.r){
        if(player.shieldTime>0){ bullets.splice(bi,1); continue; }
        bullets.splice(bi,1);
        hitPlayer(); return;
      }
    }
  }

  // Asteroids vs player
  if(!player.dead&&player.invincible<=0){
    [...asteroids,...debris].forEach(a=>{
      if(Math.hypot(a.x-player.x,a.y-player.y)<a.r+player.r-6){
        if(player.shieldTime>0) return;
        hitPlayer();
      }
    });
    // Boss vs player
    if(bossObj&&Math.hypot(bossObj.x-player.x,bossObj.y-player.y)<bossObj.r+player.r-8){
      if(player.shieldTime<=0) hitPlayer();
    }
  }

  // Powerup pickup
  powerups=powerups.filter(p=>{
    if(Math.hypot(p.x-player.x,p.y-player.y)<20){
      if(p.type==='shield'){
        player.shieldTime=180;
        burst(p.x,p.y,'#3dd9a4',10);
      } else if(p.type==='rapid'){
        player.rapidFire=900; // 15 seconds at 60fps
        burst(p.x,p.y,'#facc15',10);
      }
      return false;
    }
    return true;
  });

  // Wave clear check
  if(!bossObj){
    const allClear=asteroids.length===0&&sharks.length===0&&debris.length===0;
    if(allClear&&wt>120){
      wave++;
      if(wave>TOTAL_WAVES){ winGame(); return; }
      spawnWave(wave);
      player.invincible=120;
      spawnPowerup();
      upHUD();
    }
  }

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=2;return p.life>0;});
}

function hitPlayer(){
  lives--;upHUD();
  burst(player.x,player.y,'#facc15',14);
  if(lives<=0){ state='over'; showOverlay('GAME OVER','The ocean claimed your squid.','PLAY AGAIN'); return; }
  player.x=CW/2;player.y=CH/2;player.vx=0;player.vy=0;player.invincible=180;
}

function burst(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-.5,life:50+Math.random()*30,col});
  }
}

function winGame(){
  state='win';
  score+=lives*200;
  upHUD();
  showOverlay('YOU WIN!','The oceans are safe!<br/>Final score: <span style="color:#3dd9a4;font-size:20px">'+score+'</span>','PLAY AGAIN');
}

function showOverlay(title,body,btn){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  const ov=document.getElementById('overlay');
  ov.querySelector('h1').textContent=title;
  ov.querySelector('p').innerHTML=body;
  ov.querySelector('button').textContent=btn;
  ov.style.display='flex';
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(){
  // Deep space ocean
  const grad=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,CW*.8);
  grad.addColorStop(0,'#060d1a');
  grad.addColorStop(1,'#020810');
  ctx.fillStyle=grad; ctx.fillRect(0,0,CW,CH);

  // Stars
  STARS.forEach(s=>{ctx.fillStyle=`rgba(180,220,255,${s.o})`;ctx.fillRect(s.x,s.y,s.r,s.r);});

  // Nebula wisps
  ctx.save(); ctx.globalAlpha=.04;
  for(let i=0;i<3;i++){
    const nx=100+i*140, ny=80+i*120;
    const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,120);
    ng.addColorStop(0,'rgba(61,217,164,1)'); ng.addColorStop(1,'rgba(61,217,164,0)');
    ctx.fillStyle=ng; ctx.fillRect(0,0,CW,CH);
  }
  ctx.restore();

  // Hammerhead sharks (heavy debris equivalent)
  debris.forEach(d=>{
    ctx.save();
    ctx.translate(d.x,d.y); ctx.rotate(d.rot);
    const s=d.r;
    const dmg=d.hp/4;
    ctx.fillStyle=`rgba(50,80,90,${.6+dmg*.4})`;
    // Body
    ctx.beginPath(); ctx.ellipse(0,0,s,s*.5,0,0,Math.PI*2); ctx.fill();
    // Hammerhead cephalofoil
    ctx.fillStyle=`rgba(35,60,70,${.6+dmg*.4})`;
    ctx.beginPath(); ctx.ellipse(s*.7,0,s*.25,s*.75,0,0,Math.PI*2); ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(-s*.85,-s*.15); ctx.lineTo(-s*1.4,-s*.55); ctx.lineTo(-s*1.1,0); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*.85,s*.15); ctx.lineTo(-s*1.4,s*.55); ctx.lineTo(-s*1.1,0); ctx.fill();
    // Dorsal
    ctx.beginPath(); ctx.moveTo(-s*.1,-s*.5); ctx.lineTo(s*.2,-s*1.0); ctx.lineTo(s*.4,-s*.5); ctx.fill();
    // Eyes on hammer ends
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(s*.7,-s*.55,s*.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(s*.7,s*.55,s*.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000810';
    ctx.beginPath(); ctx.arc(s*.71,-s*.55,s*.06,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(s*.71,s*.55,s*.06,0,Math.PI*2); ctx.fill();
    // Battle damage scars
    if(d.hp<3){
      ctx.strokeStyle='rgba(255,100,100,.4)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-s*.2,-s*.3); ctx.lineTo(s*.3,s*.2); ctx.stroke();
    }
    if(d.hp<2){
      ctx.beginPath(); ctx.moveTo(s*.1,-s*.4); ctx.lineTo(-s*.2,s*.3); ctx.stroke();
    }
    ctx.restore();
  });

  // Sharks (replacing squid asteroids)
  asteroids.forEach(a=>{
    ctx.save();
    ctx.translate(a.x,a.y); ctx.rotate(a.rot);
    const s=a.r;
    const col=a.size==='large'?'#3a5a6a':a.size==='medium'?'#2a4a5a':'#1a3a4a';
    const col2=a.size==='large'?'#2a4a5a':a.size==='medium'?'#1a3a4a':'#0a2a3a';
    // Body
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.ellipse(0,0,s*1.4,s*.65,0,0,Math.PI*2); ctx.fill();
    // Tail fork
    ctx.fillStyle=col2;
    ctx.beginPath();
    ctx.moveTo(-s*1.2,-s*.2); ctx.lineTo(-s*1.8,-s*.7); ctx.lineTo(-s*1.4,0); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*1.2,s*.2); ctx.lineTo(-s*1.8,s*.7); ctx.lineTo(-s*1.4,0); ctx.fill();
    // Dorsal fin
    ctx.fillStyle=col2;
    ctx.beginPath();
    ctx.moveTo(-s*.2,-s*.65); ctx.lineTo(s*.3,-s*1.2); ctx.lineTo(s*.6,-s*.65); ctx.fill();
    // Pectoral fins
    ctx.fillStyle=col2;
    ctx.beginPath(); ctx.moveTo(s*.2,-s*.65); ctx.lineTo(s*.6,-s*1.1); ctx.lineTo(s*.8,-s*.55); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s*.2,s*.65); ctx.lineTo(s*.6,s*1.1); ctx.lineTo(s*.8,s*.55); ctx.fill();
    // White belly
    ctx.fillStyle='rgba(200,220,220,.25)';
    ctx.beginPath(); ctx.ellipse(s*.2,0,s*.8,s*.35,0,0,Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(s*.7,-s*.2,s*.15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000a10'; ctx.beginPath(); ctx.arc(s*.72,-s*.2,s*.09,0,Math.PI*2); ctx.fill();
    // Mouth (grin with teeth)
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(s*1.1,s*.1,s*.3,Math.PI*.1,Math.PI*.6); ctx.stroke();
    if(a.size!=='small'){
      ctx.fillStyle='white';
      for(let t=0;t<3;t++){
        const tx=s*1.05+t*s*.1, ty=s*.18;
        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+s*.04,ty+s*.12); ctx.lineTo(tx+s*.08,ty); ctx.fill();
      }
    }
    // Size label hint - hammerhead shape for large
    if(a.size==='large'){
      ctx.fillStyle=col2;
      ctx.beginPath();
      ctx.ellipse(s*1.1,0,s*.18,s*.55,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(s*1.1,-s*.3,s*.12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000a10'; ctx.beginPath(); ctx.arc(s*1.12,-s*.3,s*.07,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });

  // Bull sharks (active hunters - chase and fire)
  sharks.forEach(s=>{
    ctx.save();
    ctx.translate(s.x,s.y); ctx.rotate(s.angle+Math.PI/2);
    const r=s.r;
    // Stocky bull shark body
    ctx.fillStyle='#607888';
    ctx.beginPath(); ctx.ellipse(0,0,r*.7,r,0,0,Math.PI*2); ctx.fill();
    // White belly
    ctx.fillStyle='rgba(220,235,235,.3)';
    ctx.beginPath(); ctx.ellipse(0,r*.1,r*.4,r*.65,0,0,Math.PI*2); ctx.fill();
    // Dorsal fin
    ctx.fillStyle='#485868';
    ctx.beginPath(); ctx.moveTo(-r*.35,-r*.2); ctx.lineTo(0,-r*1.3); ctx.lineTo(r*.35,-r*.2); ctx.fill();
    // Pectoral fins
    ctx.beginPath(); ctx.moveTo(-r*.7,r*.1); ctx.lineTo(-r*1.2,r*.5); ctx.lineTo(-r*.5,r*.4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*.7,r*.1); ctx.lineTo(r*1.2,r*.5); ctx.lineTo(r*.5,r*.4); ctx.fill();
    // Tail
    ctx.beginPath(); ctx.moveTo(-r*.3,r*.9); ctx.lineTo(-r*.7,r*1.4); ctx.lineTo(0,r*.85); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*.3,r*.9); ctx.lineTo(r*.7,r*1.4); ctx.lineTo(0,r*.85); ctx.fill();
    // Glowing red eyes (hunter)
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(-r*.28,-r*.45,r*.14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(r*.28,-r*.45,r*.14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#cc0000'; ctx.beginPath(); ctx.arc(-r*.28,-r*.45,r*.09,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#cc0000'; ctx.beginPath(); ctx.arc(r*.28,-r*.45,r*.09,0,Math.PI*2); ctx.fill();
    ctx.shadowColor='#f87171'; ctx.shadowBlur=6;
    ctx.fillStyle='rgba(255,50,50,.6)'; ctx.beginPath(); ctx.arc(-r*.28,-r*.45,r*.05,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,50,50,.6)'; ctx.beginPath(); ctx.arc(r*.28,-r*.45,r*.05,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // Teeth
    ctx.fillStyle='white';
    for(let t=-1;t<=1;t++){
      ctx.beginPath(); ctx.moveTo(t*r*.25,-r*.95); ctx.lineTo(t*r*.35,-r*.75); ctx.lineTo(t*r*.15,-r*.75); ctx.fill();
    }
    ctx.restore();
  });

  // Boss
  if(bossObj){
    ctx.save();
    ctx.translate(bossObj.x,bossObj.y); ctx.rotate(bossObj.angle);
    // Glow
    ctx.shadowColor='#f87171'; ctx.shadowBlur=30+bossObj.phase*20;
    if(imgs.b) ctx.drawImage(imgs.b,-bossObj.r,-bossObj.r*1.2,bossObj.r*2,bossObj.r*2.4);
    ctx.shadowBlur=0;
    ctx.restore();
    // HP bar
    const bw=120, bh=8, bx=bossObj.x-bw/2, by=bossObj.y-bossObj.r-22;
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(bx,by,bw,bh);
    const pct=bossObj.hp/bossObj.maxHp;
    const hcol=pct>.5?'#3dd9a4':pct>.25?'#facc15':'#f87171';
    ctx.fillStyle=hcol; ctx.fillRect(bx,by,bw*pct,bh);
    ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='9px monospace';
    ctx.fillText('BOSS',bossObj.x-10,by-4);
  }

  // Powerups
  powerups.forEach(p=>{
    const pulse=1+Math.sin(p.pulse)*.15;
    const col=p.type==='rapid'?'#facc15':'#3dd9a4';
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.shadowColor=col; ctx.shadowBlur=12;
    ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.globalAlpha=.7+Math.sin(p.pulse)*.3;
    // Shield = hexagon, Rapid = 4-pointed star burst
    ctx.beginPath();
    if(p.type==='rapid'){
      for(let i=0;i<8;i++){
        const a=i*Math.PI/4+p.pulse*.15;
        const r=i%2===0?14*pulse:7*pulse;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
    } else {
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3+p.pulse*.2;
        const r=12*pulse;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
    }
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle=col; ctx.font='9px monospace';
    ctx.textAlign='center';
    ctx.fillText(p.type==='rapid'?'RAPID':'INK',0,4);
    ctx.textAlign='left';
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.restore();
  });

  // Player
  if(!player.dead&&(player.invincible<=0||Math.floor(wt/5)%2===0)){
    ctx.save();
    ctx.translate(player.x,player.y);
    ctx.rotate(player.angle+Math.PI/2);
    // Shield bubble
    if(player.shieldTime>0){
      const sa=player.shieldTime/180;
      ctx.strokeStyle=`rgba(61,217,164,${sa*.8})`;
      ctx.shadowColor='#3dd9a4'; ctx.shadowBlur=16*sa;
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,player.r+8,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
    }
    // Thrust flame
    if(keys.thrust||keys.ArrowUp){
      ctx.fillStyle=`rgba(61,217,164,${.4+Math.random()*.4})`;
      ctx.beginPath();
      ctx.moveTo(-6,player.r); ctx.lineTo(0,player.r+10+Math.random()*8); ctx.lineTo(6,player.r);
      ctx.fill();
    }
    if(imgs.p){
      ctx.globalAlpha=1;
      ctx.filter='hue-rotate(140deg) saturate(2) brightness(1.1)';
      ctx.drawImage(imgs.p,-20,-24,40,49);
      ctx.filter='none';
    }
    ctx.restore();
  }

  // Bullets
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r||3,0,Math.PI*2);
    if(b.enemy){
      ctx.fillStyle='rgba(248,113,113,.9)';
      ctx.shadowColor='#f87171'; ctx.shadowBlur=8;
    } else if(b.rapid){
      ctx.fillStyle='rgba(250,204,21,.95)';
      ctx.shadowColor='#facc15'; ctx.shadowBlur=10;
    } else {
      ctx.fillStyle='rgba(61,217,164,.9)';
      ctx.shadowColor='#3dd9a4'; ctx.shadowBlur=8;
    }
    ctx.fill(); ctx.shadowBlur=0;
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/80;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Status indicators
  ctx.font='10px monospace';
  const indicators=[];
  if(player.shieldCooldown>0) indicators.push({t:'SHIELD RECHARGING',c:'rgba(61,217,164,.3)'});
  else if(player.shieldTime>0) indicators.push({t:'⬡ SHIELD: '+Math.ceil(player.shieldTime/60)+'s',c:'#3dd9a4'});
  if(player.rapidFire>0) indicators.push({t:'★ RAPID FIRE: '+Math.ceil(player.rapidFire/60)+'s',c:'#facc15'});
  indicators.forEach((ind,i)=>{
    ctx.fillStyle=ind.c;
    ctx.fillText(ind.t, 10, CH-10-i*16);
  });
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(){ update(); draw(); raf=requestAnimationFrame(loop); }

// ── Fire ──────────────────────────────────────────────────────────────────────
let lastFire=0;
function fire(){
  if(state!=='playing'||player.dead) return;
  const now=Date.now();
  const cooldown=player.rapidFire>0?80:200;
  if(now-lastFire<cooldown) return;
  lastFire=now;
  if(player.rapidFire>0){
    // Triple shot spread
    for(let i=-1;i<=1;i++){
      const a=player.angle+i*.18;
      bullets.push({
        x:player.x+Math.cos(a)*player.r,
        y:player.y+Math.sin(a)*player.r,
        vx:player.vx+Math.cos(a)*8,
        vy:player.vy+Math.sin(a)*8,
        life:55, enemy:false, r:3, rapid:true
      });
    }
  } else {
    bullets.push({
      x:player.x+Math.cos(player.angle)*player.r,
      y:player.y+Math.sin(player.angle)*player.r,
      vx:player.vx+Math.cos(player.angle)*8,
      vy:player.vy+Math.sin(player.angle)*8,
      life:55, enemy:false, r:3
    });
  }
}

function shield(){
  if(state!=='playing'||player.shieldCooldown>0||player.shieldTime>0) return;
  player.shieldTime=180;
  player.shieldCooldown=480;
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '){e.preventDefault();fire();}
  if(e.key==='s'||e.key==='S'){e.preventDefault();shield();}
  if(['ArrowUp','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{delete keys[e.key];});

function hold(k,el){
  el.addEventListener('pointerdown',e=>{e.preventDefault();keys[k]=true;});
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>el.addEventListener(ev,()=>delete keys[k]));
}
hold('ArrowLeft',document.getElementById('cL'));
hold('ArrowRight',document.getElementById('cR'));
hold('thrust',document.getElementById('cT'));
document.getElementById('cF').addEventListener('pointerdown',e=>{e.preventDefault();fire();});
document.getElementById('cS').addEventListener('pointerdown',e=>{e.preventDefault();shield();});

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  if(raf){cancelAnimationFrame(raf);raf=null;}
  initGame(); loop();
});
</script>

<style>
/* ── Mobile viewport fit ── */
@media (max-height: 700px), (max-width: 480px) {
  body { justify-content: flex-start !important; overflow-y: auto !important; }
  #wrap { transform-origin: top center; }
}
</style>
<script>
(function(){
  function fitGame(){
    const wrap = document.getElementById('wrap');
    if(!wrap) return;
    const btns = document.getElementById('controls') ||
                 document.getElementById('ctrlBar') ||
                 document.getElementById('dpad') ||
                 document.getElementById('btns') ||
                 document.getElementById('squidBar');
    const hud  = document.getElementById('hud');

    // Total natural height of all elements
    const wrapH   = wrap.scrollHeight || wrap.offsetHeight;
    const btnsH   = btns  ? btns.offsetHeight  : 0;
    const hudH    = hud   ? hud.offsetHeight   : 0;
    const padding = 16;
    const totalH  = wrapH + btnsH + hudH + padding;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Scale down wrap+canvas to fit height, never scale up
    const scaleH = Math.min(1, (vh - btnsH - padding) / (wrapH + hudH || 1));
    const scaleW = Math.min(1, vw / (wrap.offsetWidth || 480));
    const scale  = Math.min(scaleH, scaleW);

    if(scale < 1){
      wrap.style.transform = 'scale(' + scale + ')';
      wrap.style.transformOrigin = 'top center';
      wrap.style.marginBottom = (wrapH * (scale - 1)) + 'px';
    } else {
      wrap.style.transform = '';
      wrap.style.marginBottom = '';
    }
  }
  window.addEventListener('load', fitGame);
  window.addEventListener('resize', fitGame);
  setTimeout(fitGame, 300);
})();
</script>
