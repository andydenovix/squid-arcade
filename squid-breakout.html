<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Squid Breakout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020810;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow-x:hidden;user-select:none;touch-action:none}
#wrap{position:relative}
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;color:#3dd9a4;font-size:12px;letter-spacing:.08em;background:rgba(2,8,16,.9)}
canvas{display:block}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(2,8,16,.92);z-index:10}
#overlay h1{color:#3dd9a4;font-size:22px;letter-spacing:.12em;text-shadow:0 0 20px rgba(61,217,164,.4)}
#overlay p{color:rgba(255,255,255,.55);font-size:12px;text-align:center;line-height:2;max-width:300px}
#overlay button{background:transparent;border:1px solid #3dd9a4;color:#3dd9a4;font-family:monospace;font-size:14px;padding:9px 32px;cursor:pointer;letter-spacing:.1em;border-radius:2px}
#overlay button:hover:not(:disabled){background:rgba(61,217,164,.12)}
#pwrBar{display:flex;gap:6px;padding:4px 10px;background:rgba(2,8,16,.8);min-height:28px;align-items:center}
.pwrIcon{font-size:14px;opacity:.4;transition:opacity .3s}
.pwrIcon.active{opacity:1}
#ctrlBar{display:flex;gap:8px;padding:8px;justify-content:center}
.cb{flex:1;max-width:120px;height:48px;background:rgba(61,217,164,.08);border:1px solid rgba(61,217,164,.2);color:#3dd9a4;font-size:13px;cursor:pointer;border-radius:6px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
.cb:active{background:rgba(61,217,164,.3)}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>SCORE <span id="scoreEl">0</span></span>
    <span style="color:rgba(61,217,164,.4);font-size:10px">SQUID BREAKOUT</span>
    <span>LIVES <span id="livesEl">🟢🟢🟢</span></span>
  </div>
  <canvas id="c" width="480" height="540"></canvas>
  <div id="pwrBar">
    <span style="color:rgba(255,255,255,.3);font-size:10px">PWR:</span>
    <span class="pwrIcon" id="pwr-wide" title="Wide">🔵</span>
    <span class="pwrIcon" id="pwr-multi" title="Multi-ball">🔴</span>
    <span class="pwrIcon" id="pwr-sticky" title="Sticky">🟡</span>
    <span class="pwrIcon" id="pwr-laser" title="Laser">🟠</span>
    <span class="pwrIcon" id="pwr-extra" title="Extra Life">💚</span>
    <span class="pwrIcon" id="pwr-speed" title="Speed">⚡</span>
    <span class="pwrIcon" id="pwr-kraken" title="KRAKEN">🦑</span>
  </div>
  <div id="overlay">
    <h1>SQUID BREAKOUT</h1>
    <p>Break the reef with your ink ball!<br/>
    Catch power-ups for special abilities.<br/>
    Beware the mighty Kraken...<br/><br/>
    Mouse/touch to move &bull; Click/tap to launch</p>
    <button id="startBtn" disabled>LOADING...</button>
  </div>
</div>
<div id="ctrlBar">
  <div class="cb" id="cbL">◀ LEFT</div>
  <div class="cb" id="cbFire">FIRE ▲</div>
  <div class="cb" id="cbR">RIGHT ▶</div>
</div>

  i.src=src;
}

  ['RFRFRFRFRF',
   'SCSCSCSCS',
   'CCCCCCCCCС',
   'IIIIIIIII',
   'RRRRRRRRRR',
   'FCCFCCFCCF',
   'SSRSSRSSR'],
];

// ── State ─────────────────────────────────────────────────────────────────────
let state,score,lives,level,blocks,balls,lasers,powerups,particles,inkClouds;
let paddle,wt=0;
let keys={};

// Power-up active timers
let pwrWide=0,pwrSticky=0,pwrLaser=0,pwrSpeed=0,pwrKraken=0;
let stuck=null; // sticky ball

const BUBBLES=Array.from({length:18},(_,i)=>({x:Math.random()*CW,y:Math.random()*CH,r:1+Math.random()*3,speed:.25+Math.random()*.4,o:.05+Math.random()*.2}));

function initGame(){
  score=0;lives=3;level=0;
  upHUD();
  loadLevel(0);
  state='playing';
}

function loadLevel(lv){
  level=lv;
  blocks=[];
  const layout=LEVELS[lv%LEVELS.length];
  for(let r=0;r<BROWS;r++){
    const row=layout[r]||'';
    for(let c=0;c<BCOLS;c++){
      const ch=row[c]||' ';
      const typeMap={C:'coral',R:'rock',S:'shell',I:'ink',F:'fish',' ':null};
      const type=typeMap[ch];
      if(type) blocks.push({x:BX0+c*BW,y:BY0+r*BH,w:BW-2,h:BH-2,type,hp:BTYPES[type].hp,maxHp:BTYPES[type].hp});
    }
  }
  // Reset paddle and ball
  paddle={x:CW/2-40,y:CH-55,w:80,h:22,speed:5};
  balls=[{x:CW/2,y:CH-80,vx:2.5,vy:-4,r:7,stuck:true}];
  lasers=[];powerups=[];particles=[];inkClouds=[];
  pwrWide=0;pwrSticky=0;pwrLaser=0;pwrSpeed=0;pwrKraken=0;stuck=null;
  upPwrBar();
}

function upHUD(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('livesEl').textContent='🟢'.repeat(lives)||'';
}

function upPwrBar(){
  document.getElementById('pwr-wide').classList.toggle('active',pwrWide>0);
  document.getElementById('pwr-multi').classList.toggle('active',balls.length>1);
  document.getElementById('pwr-sticky').classList.toggle('active',pwrSticky>0);
  document.getElementById('pwr-laser').classList.toggle('active',pwrLaser>0);
  document.getElementById('pwr-speed').classList.toggle('active',pwrSpeed>0);
  document.getElementById('pwr-kraken').classList.toggle('active',pwrKraken>0);
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(){
  if(state!=='playing') return;
  wt++;

  // Paddle move
  const pw=pwrWide>0?120:pwrKraken>0?180:80;
  paddle.w=pw;
  if(keys.left)  paddle.x=Math.max(0,paddle.x-paddle.speed);
  if(keys.right) paddle.x=Math.min(CW-paddle.w,paddle.x+paddle.speed);

  // Timers
  if(pwrWide>0){pwrWide--;} if(pwrSticky>0){pwrSticky--;} if(pwrLaser>0){pwrLaser--;} if(pwrSpeed>0){pwrSpeed--;} if(pwrKraken>0){pwrKraken--;}
  upPwrBar();

  // Ink clouds fade
  inkClouds=inkClouds.filter(ic=>{ic.life--;return ic.life>0;});

  // Balls
  const spd=pwrSpeed>0?1.4:pwrKraken>0?0.7:1.0;
  balls.forEach(ball=>{
    if(ball.stuck){
      ball.x=paddle.x+paddle.w/2;
      ball.y=paddle.y-ball.r-1;
      return;
    }
    ball.x+=ball.vx*spd;
    ball.y+=ball.vy*spd;

    // Ink cloud slowdown
    inkClouds.forEach(ic=>{
      if(Math.hypot(ball.x-ic.x,ball.y-ic.y)<ic.r) ball.vy*=.998;
    });

    // Walls
    if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);}
    if(ball.x+ball.r>CW){ball.x=CW-ball.r;ball.vx=-Math.abs(ball.vx);}
    if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);}

    // Paddle collision
    if(ball.vy>0&&ball.x>paddle.x-ball.r&&ball.x<paddle.x+paddle.w+ball.r&&
       ball.y+ball.r>paddle.y&&ball.y-ball.r<paddle.y+paddle.h){
      ball.y=paddle.y-ball.r;
      // Angle based on hit position
      const rel=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      const spd2=Math.hypot(ball.vx,ball.vy);
      ball.vx=rel*5;
      ball.vy=-Math.sqrt(Math.max(1,spd2*spd2-ball.vx*ball.vx));
      if(pwrSticky>0){ball.stuck=true;}
      burst(ball.x,paddle.y,'#3dd9a4',4);
    }

    // Lost
    if(ball.y>CH+20) ball.dead=true;

    // Block collision
    for(let bi=blocks.length-1;bi>=0;bi--){
      const bl=blocks[bi];
      if(bl.hp<=0) continue;
      if(ball.x+ball.r>bl.x&&ball.x-ball.r<bl.x+bl.w&&
         ball.y+ball.r>bl.y&&ball.y-ball.r<bl.y+bl.h){
        // Which side?
        const fromLeft=Math.abs(ball.x+ball.r-bl.x);
        const fromRight=Math.abs(ball.x-ball.r-bl.x-bl.w);
        const fromTop=Math.abs(ball.y+ball.r-bl.y);
        const fromBot=Math.abs(ball.y-ball.r-bl.y-bl.h);
        const min=Math.min(fromLeft,fromRight,fromTop,fromBot);
        if(bl.type!=='shell'){
          if(min===fromLeft||min===fromRight) ball.vx*=-1;
          else ball.vy*=-1;
        } else {
          if(min===fromLeft||min===fromRight) ball.vx*=-1;
          else ball.vy*=-1;
        }
        if(bl.type!=='shell'){
          bl.hp--;
          burst(bl.x+bl.w/2,bl.y+bl.h/2,BTYPES[bl.type].base,5);
          if(bl.hp<=0){
            score+=BTYPES[bl.type].pts*(level+1);
            upHUD();
            if(bl.type==='ink') spawnInkCloud(bl.x+bl.w/2,bl.y+bl.h/2);
            if(bl.type==='fish') spawnPowerup(bl.x+bl.w/2,bl.y+bl.h/2);
            blocks.splice(bi,1);
          }
        }
        break;
      }
    }
  });

  // Remove dead balls
  balls=balls.filter(b=>!b.dead);
  if(balls.length===0){
    lives--;upHUD();
    if(lives<=0){endGame();return;}
    balls=[{x:CW/2,y:CH-80,vx:2.5,vy:-4,r:7,stuck:true}];
    pwrWide=0;pwrSticky=0;pwrLaser=0;pwrSpeed=0;pwrKraken=0;
    paddle.x=CW/2-40;
    upPwrBar();
  }

  // Lasers
  lasers=lasers.filter(l=>{
    l.y-=8;
    // Hit blocks
    for(let bi=blocks.length-1;bi>=0;bi--){
      const bl=blocks[bi];
      if(bl.type==='shell') continue;
      if(l.x>bl.x&&l.x<bl.x+bl.w&&l.y>bl.y&&l.y<bl.y+bl.h){
        bl.hp--;
        burst(l.x,l.y,BTYPES[bl.type].base,4);
        if(bl.hp<=0){score+=BTYPES[bl.type].pts*(level+1);upHUD();if(bl.type==='fish')spawnPowerup(bl.x+bl.w/2,bl.y+bl.h/2);blocks.splice(bi,1);}
        return false;
      }
    }
    return l.y>0;
  });

  // Auto-fire lasers
  if(pwrLaser>0&&wt%18===0){
    lasers.push({x:paddle.x+10,y:paddle.y});
    lasers.push({x:paddle.x+paddle.w-10,y:paddle.y});
  }
  if(pwrKraken>0&&wt%12===0){
    lasers.push({x:paddle.x+paddle.w/2-20,y:paddle.y});
    lasers.push({x:paddle.x+paddle.w/2,    y:paddle.y});
    lasers.push({x:paddle.x+paddle.w/2+20,y:paddle.y});
  }

  // Power-ups fall
  powerups=powerups.filter(p=>{
    p.y+=2; p.pulse+=.1;
    if(p.x>paddle.x&&p.x<paddle.x+paddle.w&&p.y>paddle.y&&p.y<paddle.y+paddle.h){
      applyPowerup(p.type);
      burst(p.x,p.y,'#facc15',8);
      return false;
    }
    return p.y<CH+20;
  });

  // Level clear
  const remaining=blocks.filter(b=>b.type!=='shell'&&b.hp>0);
  if(remaining.length===0){
    state='levelclear';
    setTimeout(()=>{ loadLevel(level+1); state='playing'; },1500);
  }

  // Particles & bubbles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.life-=3;return p.life>0;});
  BUBBLES.forEach(b=>{b.y-=b.speed;if(b.y<-10)b.y=CH+10;b.x+=Math.sin(wt*.01+b.y*.02)*.3;});
}

function spawnInkCloud(x,y){
  inkClouds.push({x,y,r:40,life:240,maxLife:240});
}

function spawnPowerup(x,y){
  const types=['wide','multi','sticky','laser','extra','speed','kraken'];
  const weights=[20,15,15,15,10,15,10];
  let sum=0,roll=Math.random()*100;
  let type='wide';
  for(let i=0;i<types.length;i++){sum+=weights[i];if(roll<sum){type=types[i];break;}}
  powerups.push({x,y,type,pulse:0});
}

const PWRCOLORS={wide:'#3dd9a4',multi:'#f87171',sticky:'#facc15',laser:'#ff8040',extra:'#40ff80',speed:'#80c0ff',kraken:'#c040ff'};
const PWRLABELS={wide:'WIDE',multi:'×2',sticky:'HOLD',laser:'ZAP',extra:'❤',speed:'⚡',kraken:'KRAKEN!'};

function applyPowerup(type){
  if(type==='wide') pwrWide=600;
  if(type==='multi'){
    const b=balls[0]||{x:CW/2,y:CH/2,r:7};
    balls.push({x:b.x,y:b.y,vx:b.vx+2,vy:b.vy,r:7,stuck:false});
    balls.push({x:b.x,y:b.y,vx:b.vx-2,vy:b.vy,r:7,stuck:false});
  }
  if(type==='sticky') pwrSticky=1800;
  if(type==='laser') pwrLaser=500;
  if(type==='extra'){lives=Math.min(5,lives+1);upHUD();}
  if(type==='speed') pwrSpeed=400;
  if(type==='kraken') pwrKraken=600;
  upPwrBar();
}

function burst(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-.5,life:40,col});
  }
}

function endGame(){
  state='over';
  document.getElementById('overlay').querySelector('h1').textContent='GAME OVER';
  document.getElementById('overlay').querySelector('p').innerHTML='The reef survived!<br/>Score: <span style="color:#3dd9a4;font-size:20px">'+score+'</span>';
  document.getElementById('overlay').querySelector('button').textContent='PLAY AGAIN';
  document.getElementById('overlay').style.display='flex';
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(){
  // BG ocean
  const grad=ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,'#020d1a');
  grad.addColorStop(.7,'#051a2e');
  grad.addColorStop(1,'#0a2a1a');
  ctx.fillStyle=grad; ctx.fillRect(0,0,CW,CH);

  // Caustic rays
  ctx.save(); ctx.globalAlpha=.02;
  for(let i=0;i<5;i++){
    const rx=60+i*90+Math.sin(wt*.007+i)*14;
    const lg=ctx.createLinearGradient(rx,0,rx+16,CH);
    lg.addColorStop(0,'rgba(80,200,160,0)'); lg.addColorStop(.5,'rgba(80,200,160,1)'); lg.addColorStop(1,'rgba(80,200,160,0)');
    ctx.fillStyle=lg; ctx.fillRect(0,0,CW,CH);
  }
  ctx.restore();

  // Bubbles
  BUBBLES.forEach(b=>{
    ctx.globalAlpha=b.o; ctx.strokeStyle='rgba(100,200,255,.7)'; ctx.lineWidth=.7;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
  }); ctx.globalAlpha=1;

  // Seabed
  for(let i=0;i<10;i++){
    const sx=20+i*48, sway=Math.sin(wt*.015+i)*.5;
    ctx.strokeStyle=`rgba(20,160,60,.2)`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx,CH); ctx.quadraticCurveTo(sx+sway*10,CH-20,sx,CH-38); ctx.stroke();
  }

  // Ink clouds
  inkClouds.forEach(ic=>{
    const a=ic.life/ic.maxLife*.4;
    const gr=ctx.createRadialGradient(ic.x,ic.y,0,ic.x,ic.y,ic.r);
    gr.addColorStop(0,`rgba(20,20,80,${a})`);
    gr.addColorStop(1,'rgba(20,20,80,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(ic.x,ic.y,ic.r,0,Math.PI*2); ctx.fill();
  });

  // Blocks — each drawn as a distinct sea creature / object
  blocks.forEach(bl=>{
    const x=bl.x,y=bl.y,w=bl.w,h=bl.h;
    const cx=x+w/2,cy=y+h/2;
    const dmg=bl.maxHp>1?1-bl.hp/bl.maxHp:0;

    ctx.save();
    switch(bl.type){

      case 'coral': {
        // Vibrant branching coral — orange-pink gradient base
        const cg=ctx.createLinearGradient(x,y,x+w,y+h);
        cg.addColorStop(0,'#ff6060'); cg.addColorStop(1,'#e03050');
        ctx.fillStyle=cg;
        ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill();
        // Coral branch shapes
        ctx.strokeStyle='rgba(255,140,100,.7)'; ctx.lineWidth=2; ctx.lineCap='round';
        // Central stem
        ctx.beginPath(); ctx.moveTo(cx,y+h-2); ctx.lineTo(cx,y+4); ctx.stroke();
        // Left branch
        ctx.beginPath(); ctx.moveTo(cx-2,y+8); ctx.lineTo(cx-8,y+2); ctx.stroke();
        // Right branch
        ctx.beginPath(); ctx.moveTo(cx+2,y+8); ctx.lineTo(cx+8,y+2); ctx.stroke();
        // Branch tips (dots)
        ctx.fillStyle='rgba(255,200,180,.8)';
        ctx.beginPath(); ctx.arc(cx,y+3,2.5,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx-8,y+2,2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+8,y+2,2,0,Math.PI*2); ctx.fill();
        // Top shine
        ctx.fillStyle='rgba(255,255,255,.2)';
        ctx.fillRect(x+2,y+1,w-4,3);
        break;
      }

      case 'rock': {
        // Rocky boulder — greens/greys, gets more cracked as damaged
        const rcols=['#7a8a78','#5a6a58','#3a4a38'];
        const ri=Math.min(2,Math.floor(dmg*3));
        ctx.fillStyle=rcols[ri];
        ctx.beginPath(); ctx.roundRect(x+1,y+1,w-2,h-2,5); ctx.fill();
        // Rocky texture — irregular bumps
        ctx.fillStyle='rgba(0,0,0,.2)';
        ctx.beginPath(); ctx.ellipse(cx-8,cy+1,5,4,-.3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx+6,cy-1,4,3,.2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.15)';
        ctx.beginPath(); ctx.ellipse(cx-4,y+4,6,2,0,0,Math.PI*2); ctx.fill();
        // Damage cracks
        if(dmg>0){
          ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1.5;
          ctx.beginPath(); ctx.moveTo(cx-6,y+3); ctx.lineTo(cx-2,cy); ctx.lineTo(cx+4,y+h-3); ctx.stroke();
        }
        if(dmg>0.5){
          ctx.beginPath(); ctx.moveTo(cx+5,y+2); ctx.lineTo(cx+1,cy-2); ctx.lineTo(cx-3,y+h-2); ctx.stroke();
        }
        break;
      }

      case 'shell': {
        // Spiral nautilus shell — pearlescent
        const sg=ctx.createLinearGradient(x,y,x+w,y+h);
        sg.addColorStop(0,'#f0e8d0'); sg.addColorStop(.4,'#fdf5e0'); sg.addColorStop(1,'#c8b890');
        ctx.fillStyle=sg;
        ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill();
        // Shell spiral lines
        ctx.strokeStyle='rgba(150,120,60,.35)'; ctx.lineWidth=1;
        for(let i=0;i<3;i++){
          const sr=4+i*3;
          ctx.beginPath(); ctx.arc(cx+2,cy,sr,Math.PI*.8,Math.PI*2.2); ctx.stroke();
        }
        // Shine
        ctx.fillStyle='rgba(255,255,255,.5)';
        ctx.beginPath(); ctx.ellipse(cx-6,y+4,7,3,-.5,0,Math.PI*2); ctx.fill();
        // Pink tint on right
        ctx.fillStyle='rgba(255,180,180,.15)';
        ctx.beginPath(); ctx.roundRect(x+w/2,y,w/2,h,{upperRight:4,lowerRight:4,upperLeft:0,lowerLeft:0}); ctx.fill();
        break;
      }

      case 'ink': {
        // Dark ink sac — deep blue-purple, drippy
        const ig=ctx.createLinearGradient(x,y,x,y+h);
        ig.addColorStop(0,'#2a2060'); ig.addColorStop(1,'#141030');
        ctx.fillStyle=ig;
        ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill();
        // Ink swirl
        ctx.strokeStyle='rgba(100,80,200,.5)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(cx-4,cy,5,0,Math.PI*1.5); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx+5,cy,3,Math.PI,Math.PI*2.8); ctx.stroke();
        // Bubbles
        ctx.strokeStyle='rgba(160,140,255,.6)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(cx-10,cy-2,3,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx+9,cy+1,2,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx+2,cy-3,1.5,0,Math.PI*2); ctx.stroke();
        // Drip
        ctx.fillStyle='rgba(80,60,160,.7)';
        ctx.beginPath(); ctx.arc(cx,y+h-1,2,0,Math.PI*2); ctx.fill();
        break;
      }

      case 'fish': {
        // Colourful tropical fish
        const fishCols=['#ff8c00','#ff4060','#40c0ff'];
        const fc=fishCols[Math.floor((bl.x/BW)%3)];
        // Block background
        ctx.fillStyle='rgba(0,60,100,.5)';
        ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill();
        // Fish body
        ctx.fillStyle=fc;
        ctx.beginPath(); ctx.ellipse(cx+2,cy,14,7,0,0,Math.PI*2); ctx.fill();
        // Tail
        ctx.beginPath(); ctx.moveTo(cx-12,cy); ctx.lineTo(cx-20,cy-6); ctx.lineTo(cx-20,cy+6); ctx.fill();
        // White stripe
        ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(cx-2,cy-7); ctx.lineTo(cx-2,cy+7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx+5,cy-6); ctx.lineTo(cx+5,cy+6); ctx.stroke();
        // Eye
        ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(cx+12,cy-2,2.5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#001020'; ctx.beginPath(); ctx.arc(cx+12,cy-2,1.5,0,Math.PI*2); ctx.fill();
        // Dorsal fin
        ctx.fillStyle=fc; ctx.globalAlpha=.7;
        ctx.beginPath(); ctx.moveTo(cx-4,cy-7); ctx.lineTo(cx,cy-13); ctx.lineTo(cx+6,cy-7); ctx.fill();
        ctx.globalAlpha=1;
        break;
      }
    }
    ctx.restore();
  });

  // Power-ups falling
  powerups.forEach(p=>{
    const col=PWRCOLORS[p.type];
    const pulse=1+Math.sin(p.pulse)*0.15;
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowColor=col; ctx.shadowBlur=10;
    ctx.fillStyle=col; ctx.globalAlpha=.85;
    ctx.beginPath(); ctx.roundRect(-18*pulse,-9*pulse,36*pulse,18*pulse,5); ctx.fill();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,.7)'; ctx.font='bold 9px monospace';
    ctx.textAlign='center'; ctx.fillText(PWRLABELS[p.type]||p.type.toUpperCase(),0,3); ctx.textAlign='left';
    ctx.restore();
  });

  // Lasers
  ctx.shadowColor='#ff8040'; ctx.shadowBlur=8;
  lasers.forEach(l=>{
    ctx.fillStyle=pwrKraken>0?'#c040ff':'#ff8040';
    ctx.fillRect(l.x-2,l.y,4,12);
  }); ctx.shadowBlur=0;

  // Balls
  balls.forEach(ball=>{
    const gr=ctx.createRadialGradient(ball.x-ball.r*.3,ball.y-ball.r*.3,1,ball.x,ball.y,ball.r);
    gr.addColorStop(0,'#80f0f0'); gr.addColorStop(1,'#1a8090');
    ctx.fillStyle=gr;
    ctx.shadowColor='#3dd9a4'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });

  // Paddle — animated canvas-drawn squid (or Kraken)
  drawSquidPaddle(paddle.x, paddle.y, paddle.w, pwrKraken>0, wt, balls);

  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life/40;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();}); ctx.globalAlpha=1;

  // Level clear flash
  if(state==='levelclear'){
    ctx.fillStyle=`rgba(61,217,164,${.3+.2*Math.sin(wt*.2)})`;
    ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='white'; ctx.font='bold 24px monospace'; ctx.textAlign='center';
    ctx.fillText('LEVEL '+(level+1)+' CLEAR!',CW/2,CH/2); ctx.textAlign='left';
  }
}

// ── Animated squid paddle ────────────────────────────────────────────────────
function drawSquidPaddle(px, py, pw, isKraken, t, balls){
  ctx.save();

  const col  = isKraken ? '#c040ff' : '#3dd9a4';
  const dark = isKraken ? '#8020c0' : '#1a8060';
  const eyeCol = '#0f2a38';

  // Glow
  ctx.shadowColor = col;
  ctx.shadowBlur  = isKraken ? 22+Math.sin(t*.1)*6 : 10;

  const bodyH = isKraken ? 38 : 26;
  const wobble = Math.sin(t*.09) * 2;

  // ── Body (mantle) ─────────────────────────────────────────────────────────
  const bodyW = pw * .55;
  const bx = px + pw/2 + wobble;
  const by = py - bodyH + 6;

  // Main body oval
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.ellipse(bx, by + bodyH/2, bodyW/2, bodyH/2, 0, 0, Math.PI*2);
  ctx.fill();

  // Body highlight
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  ctx.beginPath();
  ctx.ellipse(bx - bodyW*.15, by + bodyH*.2, bodyW*.18, bodyH*.18, -.4, 0, Math.PI*2);
  ctx.fill();

  // Apex spike / fin top
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.moveTo(bx - bodyW*.22, by + 4);
  ctx.lineTo(bx, by - (isKraken?14:9));
  ctx.lineTo(bx + bodyW*.22, by + 4);
  ctx.fill();

  // Side fins
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(bx - bodyW/2, by + bodyH*.3);
  ctx.quadraticCurveTo(bx - bodyW*.75, by + bodyH*.1, bx - bodyW*.55, by + bodyH*.55);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bx + bodyW/2, by + bodyH*.3);
  ctx.quadraticCurveTo(bx + bodyW*.75, by + bodyH*.1, bx + bodyW*.55, by + bodyH*.55);
  ctx.fill();

  // ── Eyes ─────────────────────────────────────────────────────────────────
  const er  = isKraken ? 6 : 4;
  const eoy = by + bodyH * .48;
  const eox = bodyW * .24;
  // Blink
  const blink = (Math.floor(t/200)%1===0 && t%200 < 6) ? 0.08 : 1;

  for(const ex of [bx - eox, bx + eox]){
    ctx.save();
    ctx.translate(ex, eoy);
    ctx.scale(1, blink);
    // White sclera
    ctx.fillStyle = 'white';
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(0, 0, er, 0, Math.PI*2); ctx.fill();
    // Pupil
    ctx.fillStyle = eyeCol;
    ctx.beginPath(); ctx.arc(er*.2, er*.1, er*.58, 0, Math.PI*2); ctx.fill();
    // Shine
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(er*.3, -er*.2, er*.2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── Tentacles ─────────────────────────────────────────────────────────────
  // Check if a ball is near any tentacle tip — if so that tentacle bats upward
  const nTents = isKraken ? 8 : 6;
  const tentSpread = pw * .9;
  const tentBaseY = py + 4;

  for(let i = 0; i < nTents; i++){
    const t_pos = i / (nTents - 1); // 0..1
    const tx = px + pw*.05 + t_pos * tentSpread;

    // Stagger wave
    const wave = Math.sin(t * .12 + i * .7) * 5;

    // Check if ball is close enough to this tentacle's tip for batting anim
    let bat = 0;
    balls.forEach(ball=>{
      if(!ball.stuck && Math.abs(ball.x - tx) < 18 && Math.abs(ball.y - (tentBaseY + 14)) < 22){
        bat = 1 - Math.abs(ball.x - tx)/18;
      }
    });

    const tipY = tentBaseY + 14 + wave - bat * 18;
    const midX = tx + Math.sin(t*.1 + i) * 3;

    ctx.strokeStyle = i % 2 === 0 ? col : dark;
    ctx.lineWidth   = isKraken ? 4 : 2.5;
    ctx.lineCap     = 'round';
    ctx.shadowBlur  = bat > 0.3 ? 14 : 4;
    ctx.shadowColor = col;

    ctx.beginPath();
    ctx.moveTo(tx, tentBaseY);
    ctx.quadraticCurveTo(midX, tentBaseY + 8, tx + Math.sin(t*.08+i)*4, tipY);
    ctx.stroke();

    // Sucker dots on longer tentacles
    if(!isKraken && i % 2 === 0){
      ctx.fillStyle = 'rgba(255,255,255,.3)';
      ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(midX, tentBaseY+6, 1.5, 0, Math.PI*2); ctx.fill();
    }
  }

  // Sticky indicator — yellow glow on tentacle tips
  if(pwrSticky > 0){
    ctx.strokeStyle='rgba(250,204,21,.7)'; ctx.lineWidth=2; ctx.setLineDash([3,3]);
    ctx.shadowColor='#facc15'; ctx.shadowBlur=8;
    ctx.strokeRect(px, py, pw, 3); ctx.setLineDash([]);
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(){ update(); draw(); requestAnimationFrame(loop); }

// ── Input ─────────────────────────────────────────────────────────────────────
function launch(){
  if(state!=='playing') return;
  balls.forEach(b=>{ if(b.stuck){ b.stuck=false; b.vx=(Math.random()-.5)*3; b.vy=-4.5; }});
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){e.preventDefault();keys.left=true;}
  if(e.key==='ArrowRight'){e.preventDefault();keys.right=true;}
  if(e.key===' '){e.preventDefault();launch();}
});
document.addEventListener('keyup',e=>{ delete keys[e.key==='ArrowLeft'?'left':'right']; });

// Mouse
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  paddle.x=Math.max(0,Math.min(CW-paddle.w,(e.clientX-rect.left)-paddle.w/2));
});
canvas.addEventListener('click',launch);

// Touch
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const tx=(e.touches[0].clientX-rect.left);
  paddle.x=Math.max(0,Math.min(CW-paddle.w,tx-paddle.w/2));
},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();launch();},{passive:false});

// Buttons
function hold(k,el){
  el.addEventListener('pointerdown',e=>{e.preventDefault();keys[k]=true;});
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>el.addEventListener(ev,()=>delete keys[k]));
}
hold('left',document.getElementById('cbL'));
hold('right',document.getElementById('cbR'));
document.getElementById('cbFire').addEventListener('pointerdown',e=>{e.preventDefault();launch();});

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  initGame(); loop();
});
</script>

<style>
/* ── Mobile viewport fit ── */
@media (max-height: 700px), (max-width: 480px) {
  body { justify-content: flex-start !important; overflow-y: auto !important; }
  #wrap { transform-origin: top center; }
}
</style>
<script>
(function(){
  function fitGame(){
    const wrap = document.getElementById('wrap');
    if(!wrap) return;
    const btns = document.getElementById('controls') ||
                 document.getElementById('ctrlBar') ||
                 document.getElementById('dpad') ||
                 document.getElementById('btns') ||
                 document.getElementById('squidBar');
    const hud  = document.getElementById('hud');

    // Total natural height of all elements
    const wrapH   = wrap.scrollHeight || wrap.offsetHeight;
    const btnsH   = btns  ? btns.offsetHeight  : 0;
    const hudH    = hud   ? hud.offsetHeight   : 0;
    const padding = 16;
    const totalH  = wrapH + btnsH + hudH + padding;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Scale down wrap+canvas to fit height, never scale up
    const scaleH = Math.min(1, (vh - btnsH - padding) / (wrapH + hudH || 1));
    const scaleW = Math.min(1, vw / (wrap.offsetWidth || 480));
    const scale  = Math.min(scaleH, scaleW);

    if(scale < 1){
      wrap.style.transform = 'scale(' + scale + ')';
      wrap.style.transformOrigin = 'top center';
      wrap.style.marginBottom = (wrapH * (scale - 1)) + 'px';
    } else {
      wrap.style.transform = '';
      wrap.style.marginBottom = '';
    }
  }
  window.addEventListener('load', fitGame);
  window.addEventListener('resize', fitGame);
  setTimeout(fitGame, 300);
})();
</script>
