<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Squid Launcher</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020810;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden;user-select:none;touch-action:none}
#wrap{position:relative}
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(2,8,16,.9);color:#3dd9a4;font-size:12px;letter-spacing:.08em}
canvas{display:block;cursor:crosshair}
#squidBar{display:flex;gap:6px;padding:5px 12px;background:rgba(2,8,16,.8);align-items:center;min-height:34px}
#squidBar span{color:rgba(255,255,255,.4);font-size:10px;margin-right:4px}
.sqIcon{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:12px;opacity:.4}
.sqIcon.ready{opacity:1;border-color:rgba(61,217,164,.6)}
.sqIcon.current{border-color:#facc15;box-shadow:0 0 7px #facc15;opacity:1}
.sqIcon.used{opacity:.2}
#tipEl{margin-left:auto;color:rgba(255,255,255,.3);font-size:10px}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(2,8,16,.93);z-index:10}
#overlay h1{color:#3dd9a4;font-size:20px;letter-spacing:.12em}
#overlay p{color:rgba(255,255,255,.55);font-size:11px;text-align:center;line-height:2;max-width:300px}
#overlay button{background:transparent;border:1px solid #3dd9a4;color:#3dd9a4;font-family:monospace;font-size:13px;padding:8px 28px;cursor:pointer;letter-spacing:.1em;border-radius:2px}
#overlay button:hover{background:rgba(61,217,164,.12)}
#msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#facc15;font-size:18px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .4s;z-index:5;text-shadow:0 0 10px #facc15;white-space:nowrap}
#targetBar{display:flex;gap:4px;padding:4px 12px;background:rgba(2,8,16,.7);align-items:center;min-height:24px}
#targetBar span{color:rgba(255,255,255,.4);font-size:10px}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>SCORE <span id="scoreEl">0</span></span>
    <span style="color:rgba(61,217,164,.35);font-size:10px">SQUID LAUNCHER</span>
    <span>WAVE <span id="waveEl">1</span></span>
  </div>
  <canvas id="c" width="560" height="420"></canvas>
  <div id="targetBar">
    <span>TARGETS:</span>
    <span id="targetIcons"></span>
    <span id="tipEl" style="margin-left:auto"></span>
  </div>
  <div id="squidBar">
    <span>SQUAD:</span>
    <div id="squidIcons"></div>
  </div>
  <div id="msg"></div>
  <div id="overlay">
    <h1>🦑 SQUID LAUNCHER</h1>
    <p>Drag to aim · Release to fire<br/>
    Tap mid-flight to activate powers!<br/><br/>
    🟢 Basic &nbsp;🔵 Ink (tap→split)<br/>
    ⚡ Electric (tap→zap) &nbsp;🔴 Speedy<br/>
    🟣 Big &nbsp;🩵 Boomerang (tap→curve)<br/><br/>
    Knock off all 🦀 crabs &amp; 🔵 urchins to win!</p>
    <button id="startBtn">LAUNCH!</button>
  </div>
</div>

// ── State ─────────────────────────────────────────────────────────────────────
let state,score,wave,levels;
let blocks,characters,squad,squidIdx;
let proj=null,trail=[],particles=[],floaters=[],lightnings=[];
let inkClouds=[];
let dragging=false,dragX=0,dragY=0;
let wt=0,camX=0,targetCamX=0;
let raf=null;

function startGame(){
  levels=makeLevels();
  score=0;wave=0;
  document.getElementById('scoreEl').textContent=0;
  loadWave(0);
  state='aiming';
}

function loadWave(wi){
  wave=wi;
  document.getElementById('waveEl').textContent=wi+1;
  const lv=levels[wi%levels.length];
  blocks=[]; characters=[];
  lv.structures.forEach(s=>{
    s.blocks.forEach(b=>blocks.push({...b,hp:getHp(b.t),maxHp:getHp(b.t),vx:0,vy:0,angle:0,angVel:0,dead:false,static:true}));
    s.chars.forEach(c=>characters.push({...c,vx:0,vy:0,angle:0,angVel:0,dead:false,hp:1,static:true}));
  });
  squad=[...lv.squad];
  squidIdx=0;
  proj=null;trail=[];particles=[];floaters=[];lightnings=[];inkClouds=[];
  dragging=false;camX=0;targetCamX=0;
  updateUI();
  state='aiming';
}

function getHp(t){return{coral:1,glass:1,plank:2,rock:4,tnt:1,barrel:2}[t]||1;}

function updateUI(){
  // Squid bar
  const bar=document.getElementById('squidIcons');
  bar.innerHTML='';
  squad.forEach((type,i)=>{
    const d=document.createElement('div');
    d.className='sqIcon'+(i<squidIdx?' used':i===squidIdx?' current':' ready');
    d.textContent=i<squidIdx?'·':STYPES[type].emoji;
    bar.appendChild(d);
  });
  // Target bar
  const tb=document.getElementById('targetIcons');
  const alive=characters.filter(c=>!c.dead);
  tb.innerHTML=alive.map(c=>c.type==='crab'?'🦀':'🔵').join(' ');
  document.getElementById('tipEl').textContent=squad[squidIdx]?STYPES[squad[squidIdx]].tip:'';
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(){
  if(state==='over'||state==='waveclear') return;
  wt++;

  // Camera
  if(proj&&!proj.done) targetCamX=Math.max(0,proj.x-180);
  else targetCamX=0;
  camX+=(targetCamX-camX)*.09;

  // Projectile
  if(proj&&!proj.done){
    proj.vy+=GRAVITY;
    if(proj.type==='boomerang'&&proj.curving){proj.vx-=.45;proj.vy-=.07;}
    proj.x+=proj.vx; proj.y+=proj.vy;
    proj.angle=Math.atan2(proj.vy,proj.vx);
    trail.push({x:proj.x,y:proj.y,life:20,col:SQ_COLS[proj.type]});

    if(proj.y+proj.r>GROUND){spatter(proj.x,proj.y,proj.col,8);proj.done=true;setTimeout(nextSquid,800);}
    if(proj.x>CW+camX+120){proj.done=true;setTimeout(nextSquid,500);}

    // Hit blocks
    for(let bi=blocks.length-1;bi>=0;bi--){
      const bl=blocks[bi];
      if(bl.dead) continue;
      if(overlaps(proj,bl)){hitBlock(proj,bl);if(proj.type!=='speedy'&&Math.hypot(proj.vx,proj.vy)<1.2){proj.done=true;setTimeout(nextSquid,700);break;}}
    }
    // Hit characters
    characters.forEach(ch=>{
      if(ch.dead) return;
      const cr=14;
      if(Math.hypot(proj.x-ch.x,proj.y-ch.y)<proj.r+cr){hitChar(proj,ch);}
    });
  }

  trail=trail.filter(t=>{t.life--;return t.life>0;});

  // Block physics — only simulate non-static blocks
  blocks.forEach(bl=>{
    if(bl.dead||bl.static) return;
    bl.vy+=GRAVITY*.45; bl.vx*=.97; bl.vy*=.99; bl.angVel*=.93;
    bl.x+=bl.vx; bl.y+=bl.vy; bl.angle+=bl.angVel;
    if(bl.y+bl.h/2>GROUND){bl.y=GROUND-bl.h/2;bl.vy*=-.22;bl.angVel*=.5;if(Math.abs(bl.vy)<.5)bl.vy=0;}
    if(bl.x+bl.w<0||bl.x>CW+300) bl.dead=true;
    // Moving block hits character
    characters.forEach(ch=>{
      if(ch.dead) return;
      if(Math.hypot(bl.x+bl.w/2-ch.x,bl.y+bl.h/2-ch.y)<20&&(Math.abs(bl.vx)>1.5||Math.abs(bl.vy)>1.5)){hitChar(null,ch);}
    });
  });

  // Character physics — only simulate non-static characters
  characters.forEach(ch=>{
    if(ch.dead||ch.static) return;
    ch.vy+=GRAVITY*.5; ch.vx*=.96; ch.angVel*=.9;
    ch.x+=ch.vx; ch.y+=ch.vy; ch.angle+=ch.angVel;
    if(ch.y>GROUND+60) ch.dead=true;
  });

  // TNT chain
  blocks.forEach(bl=>{
    if(bl.dead&&bl.t==='tnt'&&!bl.exploded){bl.exploded=true;tntExplode(bl.x+bl.w/2,bl.y+bl.h/2);}
  });

  lightnings=lightnings.filter(l=>{l.life--;return l.life>0;});
  inkClouds=inkClouds.filter(i=>{i.life--;return i.life>0;});
  floaters=floaters.filter(f=>{f.y-=.7;f.life--;return f.life>0;});
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.life-=2;return p.life>0;});

  // Win check
  if(state==='flying'||state==='aiming'){
    const alive=characters.filter(c=>!c.dead);
    if(alive.length===0){
      state='waveclear';
      const bonus=(squad.length-squidIdx)*150;
      score+=bonus;
      document.getElementById('scoreEl').textContent=score;
      showMsg('WAVE '+(wave+1)+' CLEAR!  +'+(bonus)+' bonus');
      setTimeout(()=>{
        const next=wave+1;
        loadWave(next%levels.length);
      },2200);
      return;
    }
  }
}

function overlaps(sq,bl){
  return sq.x+sq.r>bl.x&&sq.x-sq.r<bl.x+bl.w&&sq.y+sq.r>bl.y&&sq.y-sq.r<bl.y+bl.h;
}

function wakeArea(cx,cy,radius){
  // Wake up all blocks and characters within radius so they become dynamic
  blocks.forEach(bl=>{
    if(bl.dead) return;
    if(Math.hypot(bl.x+bl.w/2-cx,bl.y+bl.h/2-cy)<radius) bl.static=false;
  });
  characters.forEach(ch=>{
    if(ch.dead) return;
    if(Math.hypot(ch.x-cx,ch.y-cy)<radius) ch.static=false;
  });
}

function hitBlock(sq,bl){
  bl.static=false; // wake this block
  wakeArea(bl.x+bl.w/2,bl.y+bl.h/2,120); // wake nearby blocks too
  const imp=Math.hypot(sq.vx,sq.vy)*sq.mass;
  const dx=bl.x+bl.w/2-sq.x, dy=bl.y+bl.h/2-sq.y, dist=Math.hypot(dx,dy)||1;
  const force=imp*.09/getHp(bl.t);
  bl.vx+=dx/dist*force; bl.vy+=dy/dist*force-1.2; bl.angVel+=(Math.random()-.5)*.25;
  if(sq.type!=='speedy') bl.hp-=Math.max(1,Math.floor(imp/6));
  else bl.hp=0;
  spatter(bl.x+bl.w/2,bl.y+bl.h/2,'#808080',4);
  if(bl.hp<=0&&!bl.dead){
    bl.dead=true;
    score+=getBlockPts(bl.t)*(1+Math.floor(wave/3));
    document.getElementById('scoreEl').textContent=score;
    spatter(bl.x+bl.w/2,bl.y+bl.h/2,getBlockCol(bl.t),10);
    if(bl.t==='tnt'&&!bl.exploded){bl.exploded=true;tntExplode(bl.x+bl.w/2,bl.y+bl.h/2);}
  }
  if(sq.type!=='speedy'){sq.vx*=.55;sq.vy*=.55;}
}

function hitChar(sq,ch){ ch.static=false; wakeArea(ch.x,ch.y,80);
  const imp=sq?Math.hypot(sq.vx,sq.vy)*sq.mass:3;
  ch.vx+=(ch.x-(sq?sq.x:ch.x-5))*.15;
  ch.vy=-imp*.25-2;
  ch.angVel=(Math.random()-.5)*.4;
  ch.dead=true;
  score+=ch.type==='crab'?200:150;
  document.getElementById('scoreEl').textContent=score;
  const emoji=ch.type==='crab'?'🦀 +200':'🔵 +150';
  floaters.push({x:ch.x-camX,y:ch.y,text:emoji,life:80,col:'#facc15'});
  spatter(ch.x,ch.y,ch.type==='crab'?'#e04020':'#4060e0',12);
  updateUI();
}

function tntExplode(ex,ey){ wakeArea(ex,ey,200);
  spatter(ex,ey,'#ff8020',20); spatter(ex,ey,'#ffff40',10);
  lightnings.push({x:ex,y:ey,r:0,maxR:100,type:'shock',life:14,maxLife:14});
  blocks.forEach(bl=>{
    if(bl.dead) return;
    const d=Math.hypot(bl.x+bl.w/2-ex,bl.y+bl.h/2-ey);
    if(d<85){bl.hp=0;bl.dead=true;bl.vx=(bl.x+bl.w/2-ex)/d*7;bl.vy=(bl.y+bl.h/2-ey)/d*7-3;}
  });
  characters.forEach(ch=>{
    if(ch.dead) return;
    if(Math.hypot(ch.x-ex,ch.y-ey)<80) hitChar(null,ch);
  });
}

function getBlockPts(t){return{coral:50,glass:60,plank:70,rock:100,tnt:120,barrel:80}[t]||50;}
function getBlockCol(t){return{coral:'#e05060',glass:'#80e0ff',plank:'#a07040',rock:'#608060',tnt:'#e06020',barrel:'#806020'}[t]||'#808080';}

function activatePower(){
  if(!proj||proj.done||proj.used) return;
  proj.used=true;
  if(proj.type==='ink'){
    inkClouds.push({x:proj.x,y:proj.y,r:55,life:200,maxLife:200});
    const a=Math.atan2(proj.vy,proj.vx), sp=Math.hypot(proj.vx,proj.vy);
    [-0.38,0.38].forEach(da=>{
      const sub={...proj,vx:Math.cos(a+da)*sp*.8,vy:Math.sin(a+da)*sp*.8,r:8,used:true};
      // simulate as secondary projectiles via particles array (visual only)
      for(let t2=0;t2<30;t2++){
        const px=proj.x+Math.cos(a+da)*sp*.8*t2,py=proj.y+Math.sin(a+da)*sp*.8*t2+(GRAVITY*.5*t2*t2);
        if(py>GROUND) break;
        particles.push({x:px,y:py,vx:0,vy:0,life:8,col:'#6060ff'});
      }
    });
  }
  if(proj.type==='electric'){
    const ZR=95;
    blocks.forEach(bl=>{
      if(bl.dead) return;
      const d=Math.hypot(bl.x+bl.w/2-proj.x,bl.y+bl.h/2-proj.y);
      if(d<ZR){
        bl.hp-=2; if(bl.hp<=0){bl.dead=true;score+=getBlockPts(bl.t);document.getElementById('scoreEl').textContent=score;}
        lightnings.push({x1:proj.x,y1:proj.y,x2:bl.x+bl.w/2,y2:bl.y+bl.h/2,life:9,maxLife:9});
      }
    });
    characters.forEach(ch=>{
      if(ch.dead) return;
      if(Math.hypot(ch.x-proj.x,ch.y-proj.y)<ZR) hitChar(proj,ch);
    });
    spatter(proj.x,proj.y,'#ffff40',14);
  }
  if(proj.type==='boomerang') proj.curving=true;
}

function nextSquid(){
  proj=null; squidIdx++;
  if(squidIdx>=squad.length){
    const alive=characters.filter(c=>!c.dead);
    if(alive.length>0){
      state='over';
      showOverlay('OUT OF SQUIDS!','Score: <span style="color:#3dd9a4;font-size:20px">'+score+'</span><br/>'+(characters.filter(c=>!c.dead).length)+' target(s) survived...','TRY AGAIN');
    }
    return;
  }
  updateUI();
  state='aiming';
}

function launchSquid(vx,vy){
  if(state!=='aiming') return;
  const type=squad[squidIdx];
  const def=STYPES[type];
  proj={x:SLING_X,y:SLING_Y,vx,vy,r:def.r,type,mass:def.mass,col:SQ_COLS[type],done:false,used:false,angle:0,curving:false};
  trail=[];
  state='flying';
}

function spatter(x,y,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=.5+Math.random()*3.5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:35+Math.random()*25,col});}
}

function showMsg(txt){const el=document.getElementById('msg');el.textContent=txt;el.style.opacity=1;setTimeout(()=>el.style.opacity=0,1800);}
function showOverlay(t,b,btn){if(raf){cancelAnimationFrame(raf);raf=null;}const ov=document.getElementById('overlay');ov.querySelector('h1').textContent=t;ov.querySelector('p').innerHTML=b;ov.querySelector('button').textContent=btn;ov.style.display='flex';}

// ── Draw ──────────────────────────────────────────────────────────────────────
const STARS=Array.from({length:55},(_,i)=>({x:(i*137+83)%CW,y:(i*97+41)%(GROUND),o:.08+((i%5)/5)*.5}));
const BUBS=Array.from({length:18},(_,i)=>({x:Math.random()*CW,y:Math.random()*CH,r:1+Math.random()*3,speed:.2+Math.random()*.35,o:.05+Math.random()*.15}));

function draw(){
  ctx.save(); ctx.translate(-camX,0);
  // BG
  const bg=ctx.createLinearGradient(camX,0,camX,CH);
  bg.addColorStop(0,'#020d1a'); bg.addColorStop(.65,'#051a2e'); bg.addColorStop(1,'#081808');
  ctx.fillStyle=bg; ctx.fillRect(camX,0,CW+200,CH);
  // Caustics
  ctx.save(); ctx.globalAlpha=.022;
  for(let i=0;i<5;i++){const rx=camX+50+i*110+Math.sin(wt*.007+i)*12;const lg=ctx.createLinearGradient(rx,0,rx+13,CH);lg.addColorStop(0,'rgba(80,200,160,0)');lg.addColorStop(.5,'rgba(80,200,160,1)');lg.addColorStop(1,'rgba(80,200,160,0)');ctx.fillStyle=lg;ctx.fillRect(camX,0,CW+200,CH);}
  ctx.restore();
  // Stars
  STARS.forEach(s=>{ctx.fillStyle=`rgba(180,220,255,${s.o})`;ctx.fillRect(s.x+camX*.08,s.y,1,1);});
  // Bubbles
  BUBS.forEach(b=>{b.y-=b.speed;if(b.y<-8)b.y=CH+8;ctx.globalAlpha=b.o;ctx.strokeStyle='rgba(100,200,255,.7)';ctx.lineWidth=.7;ctx.beginPath();ctx.arc(b.x+camX,b.y,b.r,0,Math.PI*2);ctx.stroke();}); ctx.globalAlpha=1;
  // Seabed
  ctx.fillStyle='#081408'; ctx.fillRect(camX,GROUND,CW+300,CH-GROUND);
  ctx.strokeStyle='rgba(30,100,30,.3)'; ctx.lineWidth=1;
  for(let i=0;i<10;i++){const rx=camX+i*70;ctx.beginPath();ctx.moveTo(rx,GROUND+4);ctx.quadraticCurveTo(rx+35,GROUND+10,rx+70,GROUND+4);ctx.stroke();}
  // Seaweed
  for(let i=0;i<14;i++){const sx=camX*.25+i*70,sw=Math.sin(wt*.018+i)*.55;ctx.strokeStyle=`rgba(20,160,60,.25)`;ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sx,GROUND);ctx.quadraticCurveTo(sx+sw*12,GROUND-22,sx,GROUND-42);ctx.quadraticCurveTo(sx-sw*9,GROUND-58,sx+sw*7,GROUND-72);ctx.stroke();}
  // Ink clouds
  inkClouds.forEach(ic=>{const a=ic.life/ic.maxLife*.3;const gr=ctx.createRadialGradient(ic.x,ic.y,0,ic.x,ic.y,ic.r);gr.addColorStop(0,`rgba(20,20,80,${a})`);gr.addColorStop(1,'rgba(20,20,80,0)');ctx.fillStyle=gr;ctx.beginPath();ctx.arc(ic.x,ic.y,ic.r,0,Math.PI*2);ctx.fill();});
  // Trail
  trail.forEach(t=>{ctx.globalAlpha=t.life/20*.6;ctx.fillStyle=t.col;ctx.beginPath();ctx.arc(t.x,t.y,3.5,0,Math.PI*2);ctx.fill();}); ctx.globalAlpha=1;
  // Shockwaves + lightning
  lightnings.forEach(l=>{
    if(l.type==='shock'){const prog=1-l.life/l.maxLife;const r=prog*l.maxR;ctx.globalAlpha=l.life/l.maxLife*.5;ctx.strokeStyle='#ff8020';ctx.lineWidth=3;ctx.beginPath();ctx.arc(l.x,l.y,r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
    else{ctx.globalAlpha=l.life/l.maxLife;ctx.strokeStyle='#ffff80';ctx.lineWidth=2;ctx.shadowColor='#ffff40';ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;}
  });
  // Blocks
  drawBlocks();
  // Characters
  drawChars();
  // Sling
  drawSling();
  // Projectile
  if(proj&&!proj.done) drawSquidSprite(proj.x,proj.y,proj.type,proj.angle,proj.r);
  // Aim guide
  if(state==='aiming'&&dragging){
    let px=SLING_X,py=SLING_Y,tvx=(SLING_X-dragX)/70*12,tvy=(SLING_Y-dragY)/70*10;
    ctx.fillStyle='rgba(255,255,255,.35)';
    for(let i=0;i<20;i++){tvy+=GRAVITY;px+=tvx;py+=tvy;if(py>GROUND)break;ctx.globalAlpha=.5-i*.024;ctx.beginPath();ctx.arc(px,py,1.8,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
    const type=squad[squidIdx];
    if(type) drawSquidSprite(SLING_X,SLING_Y,type,Math.atan2(-(SLING_Y-dragY),-(SLING_X-dragX)),STYPES[type].r);
  } else if(state==='aiming'){
    const type=squad[squidIdx];
    if(type) drawSquidSprite(SLING_X,SLING_Y,type,0,STYPES[type].r);
  }
  ctx.restore();
  // Floaters (screen space)
  floaters.forEach(f=>{ctx.globalAlpha=Math.min(1,f.life/60);ctx.fillStyle=f.col;ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText(f.text,f.x,f.y);ctx.textAlign='left';}); ctx.globalAlpha=1;
  // Particles
  ctx.save(); ctx.translate(-camX,0);
  particles.forEach(p=>{ctx.globalAlpha=p.life/60;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();}); ctx.globalAlpha=1;
  ctx.restore();
}

function drawSquidSprite(x,y,type,angle,r){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle+Math.PI/2);
  const im=imgs[type];
  if(im){
    const w=r*2.2,h=r*2.8;
    if(type==='electric'){ctx.shadowColor='#ffff40';ctx.shadowBlur=14;}
    if(type==='big'){ctx.shadowColor='#c040ff';ctx.shadowBlur=18;}
    ctx.drawImage(im,-w/2,-h/2,w,h);
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

function drawSling(){
  ctx.strokeStyle='#604020'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(SLING_X-14,GROUND); ctx.lineTo(SLING_X-18,SLING_Y-12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(SLING_X+14,GROUND); ctx.lineTo(SLING_X+18,SLING_Y-12); ctx.stroke();
  // Bands
  ctx.strokeStyle='#c08040'; ctx.lineWidth=2.5;
  const lx=SLING_X-18,ly=SLING_Y-12,rx=SLING_X+18,ry=SLING_Y-12;
  if(dragging&&state==='aiming'){
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(dragX,dragY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(dragX,dragY); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(SLING_X,SLING_Y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(SLING_X,SLING_Y); ctx.stroke();
  }
}

function drawBlocks(){
  blocks.forEach(bl=>{
    if(bl.dead) return;
    ctx.save();
    ctx.translate(bl.x+bl.w/2,bl.y+bl.h/2); ctx.rotate(bl.angle);
    const x=-bl.w/2,y=-bl.h/2,w=bl.w,h=bl.h;
    const dmg=bl.maxHp>1?1-bl.hp/bl.maxHp:0;
    switch(bl.t){
      case 'coral':{
        const cg=ctx.createLinearGradient(x,y,x+w,y+h);
        cg.addColorStop(0,'#e05060'); cg.addColorStop(1,'#c03050');
        ctx.fillStyle=cg; ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill();
        ctx.strokeStyle='rgba(255,140,100,.6)'; ctx.lineWidth=1.5; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(0,y+h-3); ctx.lineTo(0,y+4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-4,y+8); ctx.lineTo(-10,y+2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(4,y+8); ctx.lineTo(10,y+2); ctx.stroke();
        ctx.fillStyle='rgba(255,180,160,.9)';
        [[0,y+2],[-10,y+2],[10,y+2]].forEach(([cx2,cy2])=>{ctx.beginPath();ctx.arc(cx2,cy2,2.5,0,Math.PI*2);ctx.fill();});
        ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(x+2,y+1,w-4,3);
        break;}
      case 'glass':{
        ctx.fillStyle=`rgba(120,220,255,${.25+dmg*.15})`;
        ctx.beginPath(); ctx.roundRect(x,y,w,h,3); ctx.fill();
        ctx.strokeStyle='rgba(180,240,255,.9)'; ctx.lineWidth=1.5; ctx.strokeRect(x,y,w,h);
        ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.ellipse(x+8,y+6,8,3,-.4,0,Math.PI*2); ctx.fill();
        if(dmg>.3){ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+3,y+3);ctx.lineTo(x+w-5,y+h-4);ctx.stroke();ctx.beginPath();ctx.moveTo(x+w-7,y+3);ctx.lineTo(x+5,y+h-3);ctx.stroke();}
        break;}
      case 'plank':{
        const pcols=['#a07040','#806030','#604020'];
        ctx.fillStyle=pcols[Math.min(2,Math.floor(dmg*3))];
        ctx.beginPath(); ctx.roundRect(x,y,w,h,2); ctx.fill();
        ctx.strokeStyle='rgba(60,30,0,.4)'; ctx.lineWidth=1;
        [.33,.66].forEach(f=>{ctx.beginPath();ctx.moveTo(x,y+h*f);ctx.lineTo(x+w,y+h*f);ctx.stroke();});
        ctx.fillStyle='rgba(255,255,255,.1)'; ctx.fillRect(x+1,y+1,w-2,3);
        if(dmg>.5){ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x+5,y+3);ctx.lineTo(x+w-7,y+h-4);ctx.stroke();}
        break;}
      case 'rock':{
        const rcols=['#7a8a78','#5a6a58','#3a4a38','#232e22'];
        ctx.fillStyle=rcols[Math.min(3,Math.floor(dmg*4))];
        ctx.beginPath(); ctx.roundRect(x,y,w,h,5); ctx.fill();
        ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(-5,2,5,4,-.3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(6,-1,4,3,.2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.1)'; ctx.beginPath(); ctx.ellipse(-2,y+5,6,2,0,0,Math.PI*2); ctx.fill();
        if(dmg>.25){ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-6,y+2);ctx.lineTo(-1,1);ctx.lineTo(4,y+h-3);ctx.stroke();}
        if(dmg>.6){ctx.beginPath();ctx.moveTo(5,y+2);ctx.lineTo(0,-1);ctx.lineTo(-3,y+h-3);ctx.stroke();}
        break;}
      case 'tnt':{
        const fl=Math.sin(wt*.35)>.4;
        ctx.fillStyle=fl?'#ff4010':'#c03010';
        ctx.beginPath(); ctx.roundRect(x,y,w,h,3); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.9)'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
        ctx.fillText('TNT',0,4); ctx.textAlign='left';
        ctx.strokeStyle='rgba(255,120,0,.5)'; ctx.lineWidth=1; ctx.strokeRect(x+1,y+1,w-2,h-2);
        ctx.strokeStyle='#a07020'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(w/2-4,y); ctx.quadraticCurveTo(w/2+4,y-6,w/2-2,y-10); ctx.stroke();
        if(fl){ctx.fillStyle='#ffff40';ctx.beginPath();ctx.arc(w/2-2,y-11,3,0,Math.PI*2);ctx.fill();}
        break;}
      case 'barrel':{
        // Wooden barrel
        ctx.fillStyle=dmg>.5?'#6a4010':'#8a5820';
        ctx.beginPath(); ctx.ellipse(0,0,w/2,h/2,0,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#c09030'; ctx.lineWidth=2;
        [-h*.3,0,h*.3].forEach(oy=>{ctx.beginPath();ctx.ellipse(0,oy,w/2,5,0,0,Math.PI*2);ctx.stroke();});
        ctx.fillStyle='rgba(255,200,100,.15)'; ctx.beginPath(); ctx.ellipse(-w*.2,-h*.2,w*.18,h*.15,-.5,0,Math.PI*2); ctx.fill();
        if(dmg>.4){ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-w*.3,0);ctx.lineTo(w*.2,h*.3);ctx.stroke();}
        break;}
    }
    ctx.restore();
  });
}

function drawChars(){
  characters.forEach(ch=>{
    if(ch.dead) return;
    ctx.save();
    ctx.translate(ch.x,ch.y); ctx.rotate(ch.angle||0);
    if(ch.type==='crab'){
      // Body
      ctx.fillStyle='#c03020';
      ctx.beginPath(); ctx.ellipse(0,0,13,9,0,0,Math.PI*2); ctx.fill();
      // Claws
      ctx.fillStyle='#a02010';
      ctx.beginPath(); ctx.arc(-16,-2,7,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(16,-2,7,0,Math.PI*2); ctx.fill();
      // Claw tips
      ctx.fillStyle='#c03020';
      ctx.beginPath(); ctx.arc(-20,-5,4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(20,-5,4,0,Math.PI*2); ctx.fill();
      // Eyes on stalks
      ctx.fillStyle='#c03020'; ctx.fillRect(-7,-14,4,7); ctx.fillRect(3,-14,4,7);
      ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(-5,-15,4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5,-15,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-5,-15,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5,-15,2,0,Math.PI*2); ctx.fill();
      // Legs
      ctx.strokeStyle='#a02010'; ctx.lineWidth=2;
      [-8,-3,3,8].forEach(lx=>{ctx.beginPath();ctx.moveTo(lx,6);ctx.lineTo(lx-3,14);ctx.stroke();});
      // Angry eyebrows
      ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-8,-19); ctx.lineTo(-2,-17); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8,-19); ctx.lineTo(2,-17); ctx.stroke();
    } else {
      // Sea urchin
      const spines=12;
      ctx.fillStyle='#3040a0';
      // Spines first
      for(let i=0;i<spines;i++){
        const a=(i/spines)*Math.PI*2;
        ctx.strokeStyle=i%3===0?'#5060c0':'#2030a0';
        ctx.lineWidth=2; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(Math.cos(a)*8,Math.sin(a)*8); ctx.lineTo(Math.cos(a)*18,Math.sin(a)*18); ctx.stroke();
      }
      // Body
      ctx.fillStyle='#3040a0'; ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(100,120,220,.4)'; ctx.beginPath(); ctx.arc(-3,-3,4,0,Math.PI*2); ctx.fill();
      // Eyes
      ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(-3,-1,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3,-1,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-3,-1,1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3,-1,1.5,0,Math.PI*2); ctx.fill();
      // Mouth
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(0,3,3,0,Math.PI); ctx.stroke();
    }
    // Quake indicator on character
    ctx.globalAlpha=.5+.5*Math.sin(wt*.15+ch.x);
    ctx.strokeStyle='rgba(255,200,0,.3)'; ctx.lineWidth=1; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;
    ctx.restore();
  });
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(){ update(); draw(); raf=requestAnimationFrame(loop); }

// ── Input ─────────────────────────────────────────────────────────────────────
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-rect.left)*(CW/rect.width)+camX,y:(src.clientY-rect.top)*(CH/rect.height)};
}
canvas.addEventListener('mousedown',e=>{if(state==='aiming'){dragging=true;const p=getPos(e);dragX=p.x;dragY=p.y;}else if(state==='flying')activatePower();});
canvas.addEventListener('mousemove',e=>{if(dragging){const p=getPos(e);dragX=p.x;dragY=p.y;}});
canvas.addEventListener('mouseup',e=>{
  if(dragging){dragging=false;const dx=SLING_X-dragX,dy=SLING_Y-dragY,mag=Math.min(Math.hypot(dx,dy),70);if(mag>8)launchSquid(dx/70*12,dy/70*10);}
});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state==='aiming'){dragging=true;const p=getPos(e);dragX=p.x;dragY=p.y;}else if(state==='flying')activatePower();},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(dragging){const p=getPos(e);dragX=p.x;dragY=p.y;}},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(dragging){dragging=false;const dx=SLING_X-dragX,dy=SLING_Y-dragY,mag=Math.min(Math.hypot(dx,dy),70);if(mag>8)launchSquid(dx/70*12,dy/70*10);}},{passive:false});

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  if(raf){cancelAnimationFrame(raf);raf=null;}
  startGame(); loop();
});
</script>
