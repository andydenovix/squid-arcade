<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Squid Tetris</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020810;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow-x:hidden;user-select:none;touch-action:none}
#layout{display:flex;gap:10px;align-items:flex-start;padding:8px}
#sidebar{display:flex;flex-direction:column;gap:8px;width:90px}
.panel{background:rgba(255,255,255,.05);border:1px solid rgba(61,217,164,.2);border-radius:6px;padding:8px;color:rgba(255,255,255,.6);font-size:10px;letter-spacing:.08em}
.panel-title{color:#3dd9a4;font-size:9px;letter-spacing:.12em;margin-bottom:6px}
#nextCanvas,#holdCanvas{display:block;margin:0 auto}
#scorePanel .val{color:#3dd9a4;font-size:18px;font-weight:bold;display:block;margin-top:2px}
#levelPanel .val{color:#facc15;font-size:18px;font-weight:bold;display:block;margin-top:2px}
#linesPanel .val{color:#f87171;font-size:16px;font-weight:bold;display:block;margin-top:2px}
canvas{display:block}
#gameCanvas{border:1px solid rgba(61,217,164,.25);border-radius:4px}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(2,8,16,.94);z-index:10}
#overlay h1{color:#3dd9a4;font-size:24px;letter-spacing:.12em;text-shadow:0 0 20px rgba(61,217,164,.4)}
#overlay p{color:rgba(255,255,255,.55);font-size:12px;text-align:center;line-height:2;max-width:280px}
#overlay button{background:transparent;border:1px solid #3dd9a4;color:#3dd9a4;font-family:monospace;font-size:14px;padding:9px 32px;cursor:pointer;letter-spacing:.1em;border-radius:2px}
#overlay button:hover{background:rgba(61,217,164,.12)}
#btns{display:flex;gap:6px;padding:8px 0;flex-wrap:wrap;justify-content:center;max-width:300px}
.gb{background:rgba(61,217,164,.08);border:1px solid rgba(61,217,164,.2);color:#3dd9a4;font-size:13px;cursor:pointer;border-radius:6px;padding:10px 0;flex:1;min-width:60px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;text-align:center}
.gb:active{background:rgba(61,217,164,.28)}
</style>
</head>
<body>
<div id="overlay">
  <h1>SQUID TETRIS</h1>
  <p>Stack sea creatures to clear the reef!<br/>
  Complete rows to score points.<br/>
  More lines at once = more points!<br/><br/>
  &#9664;&#9654; move &bull; &#9650; rotate &bull; &#9660; soft drop<br/>
  Space = hard drop &bull; H = hold</p>
  <button id="startBtn">START GAME</button>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="panel">
      <div class="panel-title">NEXT</div>
      <canvas id="nextCanvas" width="80" height="80"></canvas>
    </div>
    <div class="panel" id="scorePanel">
      <div class="panel-title">SCORE</div>
      <span class="val" id="scoreEl">0</span>
    </div>
    <div class="panel" id="levelPanel">
      <div class="panel-title">LEVEL</div>
      <span class="val" id="levelEl">1</span>
    </div>
    <div class="panel" id="linesPanel">
      <div class="panel-title">LINES</div>
      <span class="val" id="linesEl">0</span>
    </div>
  </div>
  <canvas id="gameCanvas" width="240" height="480"></canvas>
</div>
<div id="btns">
  <div class="gb" id="bL">&#9664;</div>
  <div class="gb" id="bDown">&#9660;</div>
  <div class="gb" id="bR">&#9654;</div>
  <div class="gb" id="bRot">&#8635; ROT</div>
  <div class="gb" id="bDrop">&#9660;&#9660; DROP</div>
</div>

<script>
const COLS=10, ROWS=20, CS=24; // cell size
const CW=COLS*CS, CH=ROWS*CS;
const gc=document.getElementById('gameCanvas');
const ctx=gc.getContext('2d');
const nc=document.getElementById('nextCanvas');
const nctx=nc.getContext('2d');

// ── Piece definitions ─────────────────────────────────────────────────────────
// Each piece: name, colour, cells (array of [col,row] offsets), creature drawing fn
const PIECES = [
  { // I - Eel (long)
    name:'Eel', key:'I',
    color:'#00d4ff', dark:'#0090b0',
    cells:[[0,1],[1,1],[2,1],[3,1]],
    rotations:[
      [[0,1],[1,1],[2,1],[3,1]],
      [[1,0],[1,1],[1,2],[1,3]],
    ]
  },
  { // O - Crab (2x2)
    name:'Crab', key:'O',
    color:'#ff6030', dark:'#c03010',
    cells:[[0,0],[1,0],[0,1],[1,1]],
    rotations:[[[0,0],[1,0],[0,1],[1,1]]]
  },
  { // T - Starfish
    name:'Starfish', key:'T',
    color:'#ff80c0', dark:'#c04080',
    cells:[[0,1],[1,1],[2,1],[1,0]],
    rotations:[
      [[0,1],[1,1],[2,1],[1,0]],
      [[1,0],[1,1],[1,2],[0,1]],
      [[0,1],[1,1],[2,1],[1,2]],
      [[1,0],[1,1],[1,2],[2,1]],
    ]
  },
  { // S - Seahorse
    name:'Seahorse', key:'S',
    color:'#40e080', dark:'#208040',
    cells:[[1,0],[2,0],[0,1],[1,1]],
    rotations:[
      [[1,0],[2,0],[0,1],[1,1]],
      [[0,0],[0,1],[1,1],[1,2]],
    ]
  },
  { // Z - Manta Ray
    name:'Manta', key:'Z',
    color:'#a060ff', dark:'#6030c0',
    cells:[[0,0],[1,0],[1,1],[2,1]],
    rotations:[
      [[0,0],[1,0],[1,1],[2,1]],
      [[1,0],[0,1],[1,1],[0,2]],
    ]
  },
  { // L - Lobster
    name:'Lobster', key:'L',
    color:'#ff4040', dark:'#c01010',
    cells:[[0,0],[0,1],[0,2],[1,2]],
    rotations:[
      [[0,0],[0,1],[0,2],[1,2]],
      [[0,0],[1,0],[2,0],[0,1]],
      [[0,0],[1,0],[1,1],[1,2]],
      [[2,0],[0,1],[1,1],[2,1]],
    ]
  },
  { // J - Shrimp
    name:'Shrimp', key:'J',
    color:'#ffc040', dark:'#c07010',
    cells:[[1,0],[1,1],[0,2],[1,2]],
    rotations:[
      [[1,0],[1,1],[0,2],[1,2]],
      [[0,0],[0,1],[1,1],[2,1]],
      [[0,0],[1,0],[0,1],[0,2]],
      [[0,0],[1,0],[2,0],[2,1]],
    ]
  },
];

// ── Drawing individual cells as sea creatures ─────────────────────────────────
function drawCell(c, x, y, size, alpha){
  ctx.save();
  ctx.globalAlpha = alpha||1;
  const cx2=x+size/2, cy2=y+size/2, r=size/2-2;

  switch(c.key){
    case 'I': // Eel segment — rounded rectangle with scale marks
      ctx.fillStyle=c.color;
      ctx.beginPath(); ctx.roundRect(x+1,y+1,size-2,size-2,4); ctx.fill();
      ctx.fillStyle=c.dark;
      ctx.beginPath(); ctx.roundRect(x+3,y+3,size-6,size-6,3); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x+4,y+size/2); ctx.lineTo(x+size-4,y+size/2); ctx.stroke();
      break;

    case 'O': // Crab segment — round with claw hints
      ctx.fillStyle=c.color;
      ctx.beginPath(); ctx.arc(cx2,cy2,r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=c.dark;
      ctx.beginPath(); ctx.arc(cx2,cy2,r*.65,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,200,150,.4)';
      ctx.beginPath(); ctx.arc(cx2-r*.3,cy2-r*.3,r*.25,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx2+r*.3,cy2-r*.3,r*.25,0,Math.PI*2); ctx.fill();
      break;

    case 'T': // Starfish — 5-pointed star
      ctx.fillStyle=c.color;
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const a=i*Math.PI/5-Math.PI/2;
        const rr=i%2===0?r:r*.45;
        i===0?ctx.moveTo(cx2+Math.cos(a)*rr,cy2+Math.sin(a)*rr):ctx.lineTo(cx2+Math.cos(a)*rr,cy2+Math.sin(a)*rr);
      }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle=c.dark;
      ctx.beginPath(); ctx.arc(cx2,cy2,r*.3,0,Math.PI*2); ctx.fill();
      break;

    case 'S': // Seahorse — curved shape
      ctx.fillStyle=c.color;
      ctx.beginPath(); ctx.roundRect(x+2,y+1,size-4,size-2,6); ctx.fill();
      // Crown
      ctx.fillStyle=c.dark;
      ctx.beginPath(); ctx.moveTo(cx2-3,y+3); ctx.lineTo(cx2,y); ctx.lineTo(cx2+3,y+3); ctx.fill();
      // Belly rings
      ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1;
      for(let i=1;i<4;i++){
        ctx.beginPath(); ctx.moveTo(x+4,y+i*(size/4)); ctx.lineTo(x+size-4,y+i*(size/4)); ctx.stroke();
      }
      break;

    case 'Z': // Manta — diamond/rhombus shape
      ctx.fillStyle=c.color;
      ctx.beginPath();
      ctx.moveTo(cx2,y+2); ctx.lineTo(x+size-2,cy2);
      ctx.lineTo(cx2,y+size-2); ctx.lineTo(x+2,cy2);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle=c.dark;
      ctx.beginPath();
      ctx.moveTo(cx2,y+5); ctx.lineTo(x+size-5,cy2);
      ctx.lineTo(cx2,y+size-5); ctx.lineTo(x+5,cy2);
      ctx.closePath(); ctx.fill();
      // Eyes
      ctx.fillStyle='white';
      ctx.beginPath(); ctx.arc(cx2-3,cy2-2,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx2+3,cy2-2,2,0,Math.PI*2); ctx.fill();
      break;

    case 'L': // Lobster segment — elongated with antenna hint
      ctx.fillStyle=c.color;
      ctx.beginPath(); ctx.roundRect(x+2,y+1,size-4,size-2,5); ctx.fill();
      ctx.fillStyle=c.dark;
      ctx.beginPath(); ctx.roundRect(x+4,y+3,size-8,size-6,3); ctx.fill();
      ctx.strokeStyle='rgba(255,150,100,.5)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(cx2-2,y+2); ctx.lineTo(cx2-6,y-2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx2+2,y+2); ctx.lineTo(cx2+6,y-2); ctx.stroke();
      break;

    case 'J': // Shrimp — curved oval
      ctx.fillStyle=c.color;
      ctx.beginPath(); ctx.ellipse(cx2,cy2,r*.9,r*.7,-.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=c.dark;
      ctx.beginPath(); ctx.ellipse(cx2+1,cy2,r*.55,r*.4,-.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,220,150,.3)';
      ctx.strokeStyle='rgba(255,200,100,.4)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x+size-2,cy2-3); ctx.lineTo(x+size+3,cy2-6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+size-2,cy2+3); ctx.lineTo(x+size+3,cy2+6); ctx.stroke();
      break;
  }

  // Shine
  ctx.fillStyle='rgba(255,255,255,.12)';
  ctx.beginPath(); ctx.ellipse(cx2-r*.25,y+r*.35,r*.3,r*.2,-.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Game state ────────────────────────────────────────────────────────────────
let board,cur,next,score,level,lines,state,raf=null;
let dropTimer=0,dropInterval=48;
let flashRows=[],flashTimer=0;
let wt=0;
const BUBBLES=Array.from({length:20},(_,i)=>({x:Math.random()*CW,y:Math.random()*CH,r:1+Math.random()*3,speed:.3+Math.random()*.4,o:Math.random()*.3+.05}));

function initGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;level=1;lines=0;wt=0;
  dropInterval=48; flashRows=[];
  next=randomPiece();
  cur=spawnPiece();
  state='playing';
  upHUD();
}

function randomPiece(){
  const p=PIECES[Math.floor(Math.random()*PIECES.length)];
  return {def:p, rot:0, x:3, y:0};
}

function spawnPiece(){
  const p=next;
  next=randomPiece();
  p.x=Math.floor(COLS/2)-2;
  p.y=0;
  p.rot=0;
  drawNext();
  if(collides(p,p.x,p.y,p.rot)){ gameOver(); return p; }
  return p;
}

function cells(piece){
  return piece.def.rotations[piece.rot%piece.def.rotations.length].map(([c,r])=>[c+piece.x,r+piece.y]);
}

function collides(piece,ox,oy,rot){
  const rots=piece.def.rotations[rot%piece.def.rotations.length];
  for(const [c,r] of rots){
    const nc=c+ox,nr=r+oy;
    if(nc<0||nc>=COLS||nr>=ROWS) return true;
    if(nr>=0&&board[nr][nc]) return true;
  }
  return false;
}

function lock(){
  cells(cur).forEach(([c,r])=>{ if(r>=0) board[r][c]={color:cur.def.color,dark:cur.def.dark,key:cur.def.key}; });
  // Check full rows
  const full=[];
  for(let r=0;r<ROWS;r++){
    if(board[r].every(c=>c!==null)) full.push(r);
  }
  if(full.length){
    flashRows=full; flashTimer=30;
    setTimeout(()=>{
      full.sort((a,b)=>b-a).forEach(r=>{
        board.splice(r,1);
        board.unshift(Array(COLS).fill(null));
      });
      flashRows=[]; flashTimer=0;
      lines+=full.length;
      const pts=[0,100,300,500,800][full.length]*(level);
      score+=pts;
      level=Math.floor(lines/10)+1;
      dropInterval=Math.max(6,48-level*4);
      upHUD();
      cur=spawnPiece();
    },320);
  } else {
    cur=spawnPiece();
  }
}

function upHUD(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('levelEl').textContent=level;
  document.getElementById('linesEl').textContent=lines;
}

function ghostY(){
  let gy=cur.y;
  while(!collides(cur,cur.x,gy+1,cur.rot)) gy++;
  return gy;
}

function hardDrop(){
  cur.y=ghostY(); lock();
}

function gameOver(){
  state='over';
  if(raf){cancelAnimationFrame(raf);raf=null;}
  document.getElementById('overlay').querySelector('h1').textContent='GAME OVER';
  document.getElementById('overlay').querySelector('p').innerHTML='The reef is full!<br/>Score: <span style="color:#3dd9a4;font-size:20px">'+score+'</span>';
  document.getElementById('overlay').querySelector('button').textContent='PLAY AGAIN';
  document.getElementById('overlay').style.display='flex';
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawBG(){
  // Ocean gradient
  const grad=ctx.createLinearGradient(0,0,0,CH);
  grad.addColorStop(0,'#020d1a');
  grad.addColorStop(1,'#051a0e');
  ctx.fillStyle=grad; ctx.fillRect(0,0,CW,CH);

  // Caustic light
  ctx.save(); ctx.globalAlpha=.025;
  for(let i=0;i<4;i++){
    const rx=30+i*60+Math.sin(wt*.008+i)*10;
    const lg=ctx.createLinearGradient(rx,0,rx+15,CH);
    lg.addColorStop(0,'rgba(80,200,160,0)'); lg.addColorStop(.5,'rgba(80,200,160,1)'); lg.addColorStop(1,'rgba(80,200,160,0)');
    ctx.fillStyle=lg; ctx.fillRect(0,0,CW,CH);
  }
  ctx.restore();

  // Grid lines
  ctx.strokeStyle='rgba(61,217,164,.05)'; ctx.lineWidth=.5;
  for(let c=0;c<=COLS;c++){ ctx.beginPath(); ctx.moveTo(c*CS,0); ctx.lineTo(c*CS,CH); ctx.stroke(); }
  for(let r=0;r<=ROWS;r++){ ctx.beginPath(); ctx.moveTo(0,r*CS); ctx.lineTo(CW,r*CS); ctx.stroke(); }

  // Bubbles
  BUBBLES.forEach(b=>{
    b.y-=b.speed; if(b.y<-10) b.y=CH+10;
    b.x+=Math.sin(wt*.01+b.y*.02)*.3;
    ctx.globalAlpha=b.o;
    ctx.strokeStyle='rgba(100,200,255,.7)'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
  });
  ctx.globalAlpha=1;

  // Seaweed
  for(let i=0;i<6;i++){
    const sx=10+i*40, sway=Math.sin(wt*.02+i)*.5;
    ctx.strokeStyle=`rgba(20,160,60,${.15+.1*(i%2)})`; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(sx,CH);
    ctx.quadraticCurveTo(sx+sway*12,CH-20,sx,CH-36);
    ctx.quadraticCurveTo(sx+sway*-10,CH-52,sx+sway*8,CH-68);
    ctx.stroke();
  }
}

function drawBoard(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=board[r][c];
      if(cell){
        const flash=flashRows.includes(r);
        if(flash){
          ctx.fillStyle=`rgba(255,255,255,${.6+.4*Math.sin(flashTimer*.4)})`;
          ctx.fillRect(c*CS,r*CS,CS,CS);
        } else {
          drawCell({...cell,key:cell.key},c*CS,r*CS,CS,1);
        }
      }
    }
  }
}

function drawPiece(piece,alpha){
  const rots=piece.def.rotations[piece.rot%piece.def.rotations.length];
  rots.forEach(([c,r])=>{
    const sc=(c+piece.x)*CS, sr=(r+piece.y)*CS;
    if(sr>=-CS) drawCell(piece.def,sc,sr,CS,alpha||1);
  });
}

function drawGhost(){
  const gy=ghostY();
  if(gy===cur.y) return;
  const rots=cur.def.rotations[cur.rot%cur.def.rotations.length];
  rots.forEach(([c,r])=>{
    const sc=(c+cur.x)*CS, sr=(r+gy)*CS;
    ctx.fillStyle='rgba(255,255,255,.08)';
    ctx.strokeStyle=cur.def.color+'44';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(sc+1,sr+1,CS-2,CS-2,3);
    ctx.fill(); ctx.stroke();
  });
}

function drawNext(){
  nctx.fillStyle='rgba(2,13,26,1)'; nctx.fillRect(0,0,80,80);
  const p=next;
  const rots=p.def.rotations[0];
  const minC=Math.min(...rots.map(([c])=>c));
  const minR=Math.min(...rots.map(([,r])=>r));
  const maxC=Math.max(...rots.map(([c])=>c));
  const maxR=Math.max(...rots.map(([,r])=>r));
  const pw=(maxC-minC+1), ph=(maxR-minR+1);
  const cs=Math.min(16,Math.floor(70/Math.max(pw,ph)));
  const ox=Math.floor((80-pw*cs)/2);
  const oy=Math.floor((80-ph*cs)/2);
  rots.forEach(([c,r])=>{
    // draw mini cell on next canvas
    const x=ox+(c-minC)*cs, y=oy+(r-minR)*cs;
    nctx.fillStyle=p.def.color;
    nctx.beginPath(); nctx.roundRect(x+1,y+1,cs-2,cs-2,3); nctx.fill();
    nctx.fillStyle=p.def.dark;
    nctx.beginPath(); nctx.roundRect(x+3,y+3,cs-6,cs-6,2); nctx.fill();
  });
  // Creature name
  nctx.fillStyle='rgba(255,255,255,.4)'; nctx.font='8px monospace';
  nctx.textAlign='center'; nctx.fillText(p.def.name,40,74); nctx.textAlign='left';
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(){
  if(state!=='playing'||flashRows.length) return;
  wt++;
  if(++dropTimer>=dropInterval){
    dropTimer=0;
    if(!collides(cur,cur.x,cur.y+1,cur.rot)){
      cur.y++;
    } else {
      lock();
    }
  }
  if(flashTimer>0) flashTimer--;
}

function draw(){
  drawBG();
  drawBoard();
  if(state==='playing'){
    drawGhost();
    drawPiece(cur,1);
  }
  ctx.globalAlpha=1;
}

function loop(){ update(); draw(); raf=requestAnimationFrame(loop); }

// ── Input ─────────────────────────────────────────────────────────────────────
const keyRepeat={};
function tryMove(dx){
  if(!collides(cur,cur.x+dx,cur.y,cur.rot)) cur.x+=dx;
}
function tryRotate(){
  const nr=(cur.rot+1)%cur.def.rotations.length;
  if(!collides(cur,cur.x,cur.y,nr)) cur.rot=nr;
  else if(!collides(cur,cur.x+1,cur.y,nr)){cur.x++;cur.rot=nr;}
  else if(!collides(cur,cur.x-1,cur.y,nr)){cur.x--;cur.rot=nr;}
}

document.addEventListener('keydown',e=>{
  if(state!=='playing') return;
  if(e.key==='ArrowLeft'){e.preventDefault();tryMove(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();tryMove(1);}
  if(e.key==='ArrowUp'){e.preventDefault();tryRotate();}
  if(e.key==='ArrowDown'){e.preventDefault();if(!collides(cur,cur.x,cur.y+1,cur.rot))cur.y++;}
  if(e.key===' '){e.preventDefault();hardDrop();}
});

document.getElementById('bL').addEventListener('pointerdown',e=>{e.preventDefault();if(state==='playing')tryMove(-1);});
document.getElementById('bR').addEventListener('pointerdown',e=>{e.preventDefault();if(state==='playing')tryMove(1);});
document.getElementById('bRot').addEventListener('pointerdown',e=>{e.preventDefault();if(state==='playing')tryRotate();});
document.getElementById('bDown').addEventListener('pointerdown',e=>{e.preventDefault();if(state==='playing'&&!collides(cur,cur.x,cur.y+1,cur.rot))cur.y++;});
document.getElementById('bDrop').addEventListener('pointerdown',e=>{e.preventDefault();if(state==='playing')hardDrop();});

// Auto-repeat for left/right on mobile hold
let holdInterval=null;
['bL','bR'].forEach(id=>{
  const dx=id==='bL'?-1:1;
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',()=>{ holdInterval=setInterval(()=>{if(state==='playing')tryMove(dx);},100); });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>el.addEventListener(ev,()=>clearInterval(holdInterval)));
});

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  if(raf){cancelAnimationFrame(raf);raf=null;}
  initGame(); loop();
});
</script>

<style>
/* ── Mobile viewport fit ── */
@media (max-height: 700px), (max-width: 480px) {
  body { justify-content: flex-start !important; overflow-y: auto !important; }
  #wrap { transform-origin: top center; }
}
</style>
<script>
(function(){
  function fitGame(){
    const wrap = document.getElementById('wrap');
    if(!wrap) return;
    const btns = document.getElementById('controls') ||
                 document.getElementById('ctrlBar') ||
                 document.getElementById('dpad') ||
                 document.getElementById('btns') ||
                 document.getElementById('squidBar');
    const hud  = document.getElementById('hud');

    // Total natural height of all elements
    const wrapH   = wrap.scrollHeight || wrap.offsetHeight;
    const btnsH   = btns  ? btns.offsetHeight  : 0;
    const hudH    = hud   ? hud.offsetHeight   : 0;
    const padding = 16;
    const totalH  = wrapH + btnsH + hudH + padding;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Scale down wrap+canvas to fit height, never scale up
    const scaleH = Math.min(1, (vh - btnsH - padding) / (wrapH + hudH || 1));
    const scaleW = Math.min(1, vw / (wrap.offsetWidth || 480));
    const scale  = Math.min(scaleH, scaleW);

    if(scale < 1){
      wrap.style.transform = 'scale(' + scale + ')';
      wrap.style.transformOrigin = 'top center';
      wrap.style.marginBottom = (wrapH * (scale - 1)) + 'px';
    } else {
      wrap.style.transform = '';
      wrap.style.marginBottom = '';
    }
  }
  window.addEventListener('load', fitGame);
  window.addEventListener('resize', fitGame);
  setTimeout(fitGame, 300);
})();
</script>
